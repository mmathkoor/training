<!DOCTYPE html>

    <!-- تضمين Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- تضمين أيقونات Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f3f4f6;
        }

        /* إعدادات الطباعة الاحترافية A4 */
        @media print {
            body { background-color: white !important; margin: 0; padding: 0; }
            @page { size: A4 portrait; margin: 0; }
            .print-hidden { display: none !important; }
            .print-page { 
                page-break-after: always; 
                page-break-inside: avoid;
                width: 210mm !important;
                height: 297mm !important;
                position: relative;
                overflow: hidden;
            }
            .print-block { display: block !important; }
        }

        /* تنسيق سكرول بار الفهرس الجانبي */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #2d3748; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #F2A900; border-radius: 4px; }
        
        .editor-focus:focus { outline: none; box-shadow: inset 0 0 0 2px #F2A900; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">

    <!-- الفهرس الجانبي (Sidebar) -->
    <aside class="print-hidden w-72 bg-[#1a1a2e] text-white flex flex-col h-full shadow-2xl z-20 transition-all duration-300">
        <div class="p-6 border-b border-gray-700 flex flex-col items-center">
            <img src="Asset 1.png" alt="KIB" class="h-16 bg-white rounded-lg p-2 mb-3" onerror="this.style.display='none'">
            <h1 class="text-lg font-bold text-center text-[#F2A900]">مسودة 2025</h1>
            <p class="text-xs text-gray-400 text-center">إدارة البحوث والدراسات</p>
        </div>
        <div class="p-4 bg-[#7A1B29] text-white text-sm font-bold flex justify-between items-center">
            <span>عدد الصفحات:</span>
            <span class="bg-[#F2A900] text-gray-900 px-2 py-0.5 rounded-full">40 صفحة</span>
        </div>
        <ul id="sidebar-menu" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
            <!-- سيتم توليد القائمة هنا عبر JS -->
        </ul>
    </aside>

    <!-- منطقة العمل الرئيسية -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden">
        
        <!-- شريط الأدوات العلوي -->
        <header class="print-hidden bg-white shadow-sm h-20 flex justify-between items-center px-8 border-b-4 border-[#7A1B29] shrink-0">
            <div>
                <h2 class="text-2xl font-black text-[#7A1B29] flex items-center gap-2">
                    <i data-lucide="layout-dashboard" class="text-[#F2A900]"></i>
                    منصة تحرير التقرير السنوي - قطاع الشركات
                </h2>
            </div>
            <div class="flex items-center gap-3">
                <button id="btn-edit" onclick="toggleEdit()" class="flex items-center gap-2 px-5 py-2.5 rounded-lg font-bold transition-all bg-gray-100 hover:bg-gray-200 text-gray-800 shadow-sm border border-gray-200">
                    <span id="edit-icon-container"><i data-lucide="edit-3" class="w-5 h-5"></i></span>
                    <span id="edit-text">تعديل المحتوى</span>
                </button>
                <button onclick="handlePrint()" class="flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-[#7A1B29] to-[#5e131f] hover:from-[#5e131f] hover:to-[#3a0a12] text-white rounded-lg font-bold transition-all shadow-md">
                    <i data-lucide="file-down" class="w-5 h-5"></i>
                    إصدار التقرير (PDF)
                </button>
            </div>
        </header>

        <!-- منطقة استعراض الورقة (A4) -->
        <div class="print-hidden flex-1 overflow-y-auto bg-gray-200 flex justify-center py-10 custom-scrollbar">
            
            <div class="relative bg-white shadow-2xl transition-all duration-500" 
                 style="width: 210mm; height: 297mm; padding: 25mm 20mm; box-sizing: border-box;">
                
                <!-- علامة مائية -->
                <div class="absolute inset-0 flex justify-center items-center opacity-[0.03] pointer-events-none overflow-hidden">
                    <h1 class="text-[250px] font-black text-[#7A1B29] transform -rotate-45 select-none">KIB</h1>
                </div>

                <!-- ترويسة الورقة الوهمية -->
                <div class="absolute top-0 left-0 w-full h-3 bg-[#7A1B29]"></div>
                <div class="absolute top-0 left-0 w-1/3 h-3 bg-[#F2A900]"></div>

                <!-- محتوى القراءة -->
                <div id="view-container" class="w-full h-full font-medium text-[17px] text-gray-800 leading-10 relative z-10 break-words">
                </div>

                <!-- محتوى التعديل -->
                <div id="edit-container" class="hidden w-full h-full relative z-20">
                    <textarea id="editor" 
                              oninput="updateContent(this.value)"

                              placeholder="اكتب محتوى الصفحة هنا..."
                              dir="rtl"></textarea>
                </div>
                
                <!-- رقم الصفحة في الأسفل -->
                <div class="absolute bottom-6 w-full left-0 text-center text-gray-400 font-bold text-sm">
                    <span id="page-indicator" class="border-t-2 border-[#F2A900] pt-2 inline-block px-4"></span>
                </div>
            </div>
        </div>

    </main>

    <!-- منطقة الطباعة (مخفية، تظهر فقط عند تصدير PDF) -->
    <div id="print-container" class="hidden print-block w-full"></div>

    <script>
        // --- بيانات التقرير السنوي 2025 (40 صفحة احترافية للبنوك الاستثمارية) ---
        const reportData = [
            { id: 1, title: "1. الغلاف الرئيسي", content: "التقرير السنوي\n\nANNUAL REPORT\n\n2025\n\nقيادة التحول المالي لقطاع الأعمال\nDriving Financial Transformation for Business\n\nبنك الكريمي الإسلامي\nAlKuraimi Islamic Bank\nCorporate & Investment Banking" },
            { id: 2, title: "2. لمحة استراتيجية", content: "عن بنك الكريمي الإسلامي\n\nنشأ بنك الكريمي الإسلامي كاستجابة استراتيجية لحاجة الاقتصاد الوطني إلى كيان مصرفي متين يركز حصرياً على تمكين قطاع الأعمال والشركات الكبرى. ووفقاً لقانون المصارف الإسلامية، يقدم البنك حلولاً مالية وهندسة استثمارية متقدمة، مصممة خصيصاً لتلبية التطلعات الكبرى للشركات، المنظمات الدولية، وكبار المستثمرين.\n\nالرؤية:\nبنك يمني قائد ذو بصمة مميزة في عالم الأعمال البنكية الإسلامية وبمعايير مؤسسية عالمية.\n\nالرسالة:\nالمساهمة في قيادة قطاع الأعمال اليمني نحو آفاق جديدة من خلال ابتكار وهندسة منتجات مصرفية استثمارية متوافقة مع أحكام الشريعة، مدعومة بأحدث التقنيات المالية المفتوحة، وكادر بشري عالي الاحترافية، لتعظيم القيمة المضافة لعملائنا وشركائنا." },
            { id: 3, title: "3. الغايات الاستراتيجية", content: "الغايات الاستراتيجية 2025-2030\n\n1. ريادة تمويل الشركات:\nابتكار وتقديم حلول تمويلية وهيكلية بمعايير عالمية، تغطي القطاعات الاقتصادية الحيوية وتستبق احتياجات كبار العملاء في مجالات التجارة الدولية والصناعة.\n\n2. التوسع الدولي وشبكة المراسلين:\nترسيخ وتوسيع التحالفات الاستراتيجية مع بنوك الفئة الأولى (Tier-1) إقليمياً ودولياً، لضمان انسيابية حركة التجارة وتأمين سلاسل الإمداد لعملائنا في كل الظروف.\n\n3. التحول الرقمي والتقنيات المالية (FinTech):\nبناء مؤسسة مالية رشيقة تعتمد على الذكاء الاصطناعي، وتحليل البيانات الضخمة، والخدمات المصرفية المفتوحة (Open Banking) لتعزيز الكفاءة التشغيلية.\n\n4. تعظيم العوائد وإدارة الثروات:\nهيكلة استثمارات آمنة وذكية لتوظيف السيولة في قنوات استثمارية متنوعة، بما يحقق عوائد مستدامة تفوق توقعات المودعين والمساهمين وتتوافق مع مقررات الهيئة الشرعية." },
            { id: 4, title: "4. منظومة القيم", content: "منظومة القيم المؤسسية\n\nالالتزام والامتثال (Compliance & Commitment):\nالامتثال الصارم للتشريعات والقوانين والمعايير الدولية، لضمان استدامة الثقة مع البنوك المراسلة والمؤسسات الدولية.\n\nالشراكة الاستراتيجية (Strategic Partnership):\nلا نقدم مجرد خدمات، بل نبني علاقات مصيرية تقوم على المصلحة المشتركة مع كبار عملائنا لضمان نموهم واستقرارهم المالي.\n\nالشفافية والحوكمة (Transparency & Governance):\nتطبيق أعلى معايير الحوكمة الرشيدة والإفصاح المالي لتعزيز موثوقية المركز المالي للبنك محلياً وعالمياً.\n\nالابتكار المالي (Financial Innovation):\nالسعي الدائم لهندسة حلول مالية غير تقليدية تتجاوز العقبات الاقتصادية وتفتح أسواقاً جديدة لقطاع الأعمال.\n\nالأمانة والموثوقية (Integrity):\nحماية أموال وبيانات عملائنا بسرية تامة وتوظيفها بأعلى معايير الأمانة، استرشاداً بضوابط الشريعة الإسلامية السمحة." },
            { id: 5, title: "5. الميزة التنافسية", content: "لماذا بنك الكريمي الإسلامي؟ .. الخيار الاستراتيجي لكبار العملاء\n\n- إدارة الحسابات المركزية (Key Account Management):\nنخصص لشركتك مدراء علاقات مصرفية (Relationship Managers) يعملون كمستشارين ماليين حصريين لك، لمتابعة عملياتك خطوة بخطوة.\n\n- بنية تكنولوجية فائقة (TEMENOS Transact):\nنعمل على أقوى نظام بنكي مركزي في العالم لضمان استقرار العمليات، سرعة التنفيذ، وقدرة الربط البرمجي (API) مع أنظمة شركتك المحاسبية (ERP).\n\n- الملاءة المالية والقدرة على التغطية:\nقوة سيولة هائلة تمكننا من تغطية التزامات البنوك الخارجية في أوقات الاستحقاق دون تأخير، مما يرفع تصنيفك الائتماني أمام مورديك الدوليين.\n\n- هندسة تمويلية مرنة:\nنصمم قروضاً وتسهيلات تتناسب تماماً مع التدفقات النقدية لدورة حياة منتجك وموسمية مبيعاتك.\n\n- خبرات استشارية معقدة:\nنقدم استشارات فنية وقانونية دقيقة في صياغة الاعتمادات المستندية وخطابات الضمان لحماية حقوقك التجارية دولياً." },
            { id: 6, title: "6. البصمة الجغرافية", content: "البصمة الجغرافية وشبكة المراسلين\n\nيتبنى بنك الكريمي الإسلامي استراتيجية تجمع بين الحضور المحلي القوي والامتداد العالمي الواسع، ليكون جسراً يربط الشركات اليمنية بالأسواق العالمية.\n\nالشبكة المحلية المخصصة للشركات:\nمراكز أعمال متخصصة (Corporate Business Centers) موزعة بعناية في أهم المدن التجارية والصناعية (صنعاء، عدن، تعز، الحديدة، المكلا، مأرب) مزودة بقاعات اجتماعات وأنظمة تواصل متقدمة لخدمة كبار العملاء بعيداً عن ازدحام الفروع التقليدية.\n\nشبكة البنوك المراسلة (Correspondent Banking Network):\nخلال 2025، وسع البنك شبكة شراكاته الاستراتيجية مع كبرى المؤسسات المالية في آسيا، أوروبا، والشرق الأوسط. نحن نمتلك حسابات (Nostro/Vostro) نشطة بعملات متعددة، مما يتيح لنا:\n- تنفيذ الحوالات التجارية عبر نظام SWIFT بسرعة فائقة.\n- تعزيز الاعتمادات المستندية (LCs) بأسعار تنافسية.\n- إصدار خطابات الضمان الدولية للمقاولات والمشاريع الكبرى.\n\nنحن بوابتك الموثوقة للتجارة العالمية المفتوحة." },
            { id: 7, title: "7. أبرز المؤشرات 2025", content: "أبرز المؤشرات المالية والتشغيلية 2025\n(Financial & Operational Highlights)\n\nفي عام التحديات، حققنا لغة الأرقام:\n\n- نمو إجمالي الأصول: بنسبة 42% لتتجاوز [رقم] مليار ريال يمني، ما يعكس قوة الجذب للمحافظ الكبرى.\n\n- حجم محفظة التمويل المشترك والمؤسسي: نمو بنسبة 55% لتصل إلى [رقم] مليار ريال، موجهة لدعم قطاعات الأغذية، الأدوية، ومواد البناء.\n\n- حجم العمليات التجارية الدولية (Trade Finance): تنفيذ عمليات اعتمادات وتحويلات بقيمة تجاوزت 1.2 مليار دولار أمريكي خلال العام، دعماً لاستقرار سلاسل الإمداد.\n\n- ودائع العملاء (قطاع الشركات): قفزة نوعية لتصل إلى [رقم] مليار ريال يمني، مما يؤكد ثقة مجتمع الأعمال والمؤسسات بقدرات البنك الاستثمارية.\n\n- معدل كفاية رأس المال (CAR): يتجاوز المتطلبات التنظيمية للبنك المركزي ومقررات لجنة بازل، مما يؤكد متانة القاعدة الرأسمالية للبنك وقدرته على امتصاص الصدمات." },
            { id: 8, title: "8. كلمة رئيس المجلس (1)", content: "كلمة رئيس مجلس الإدارة\n\nالإخوة المساهمون الأكارم،\nشركاؤنا وضيوفنا من قادة قطاع الأعمال،\nالسلام عليكم ورحمة الله وبركاته،\n\nيطيب لي، باسمي وباسم مجلس الإدارة، أن أضع بين أيديكم التقرير السنوي لنتائج أعمال بنك الكريمي الإسلامي لعام 2025م. لقد كان هذا العام امتحاناً حقيقياً لقوة الاستراتيجيات المؤسسية، حيث أثبت البنك مجدداً أنه الملاذ الآمن والرافعة المالية الأقوى للشركات وكبار التجار في اليمن.\n\nالمشهد الاقتصادي والمتغيرات الكلية\nطغت على المشهد العالمي في 2025 تحولات جيوسياسية حادة أثرت بشكل مباشر على حركة الملاحة، وسلاسل الإمداد، وتكاليف التأمين البحري، ناهيك عن التذبذبات في أسواق العملات العالمية وسياسات الفائدة الصارمة. محلياً، انعكست هذه الظروف على تكلفة الاستيراد واستقرار الإيرادات، مما شكل ضغطاً غير مسبوق على قطاع الأعمال والشركات الصناعية والتجارية.\n\nفي خضم هذه التحديات، أدركنا في بنك الكريمي الإسلامي أن مسؤوليتنا تتجاوز دور الوسيط المالي، لنصبح \"مديري أزمات\" و\"شركاء استراتيجيين\". لقد سخرنا كل إمكانياتنا وشبكة علاقاتنا الدولية لضمان عدم توقف عجلة الإنتاج والاستيراد لدى عملائنا." },
            { id: 9, title: "9. كلمة رئيس المجلس (2)", content: "إنجازاتنا: تحويل التحديات إلى نمو مستدام\n\nرغم قسوة المشهد الاقتصادي، نجح البنك في تحقيق نتائج استثنائية. لقد أعدنا هندسة باقة خدماتنا لتلائم متطلبات المرحلة، مما مكّننا من تمويل استيراد السلع الاستراتيجية بفاعلية كبرى. \n\nعلى صعيد الأداء المالي، واصل البنك تحقيق أرقام قياسية تعكس جودة محفظته الائتمانية وكفاءة إدارة الأصول والخصوم، حيث حققنا صافي دخل متميز ونمواً هائلاً في حجم الأصول المدارة. كما كان لسياسات التحوط وإدارة المخاطر الصارمة دور حاسم في حماية حقوق المودعين وتوزيع أرباح استثمارية تنافسية هي من بين الأعلى في السوق اليمني.\n\nنظرة نحو المستقبل\nنحن عازمون في 2026 على المضي قدماً في استراتيجية الرقمنة الشاملة للخدمات المؤسسية، والتوسع في تمويل المشاريع النوعية الداعمة للاقتصاد الأخضر والبنية التحتية. \n\nختاماً، أتوجه بخالص الشكر للبنك المركزي اليمني على توجيهاته، ولعملائنا الكرام على ثقتهم المطلقة، ولأعضاء هيئة الرقابة الشرعية، والإدارة التنفيذية، وكافة موظفي البنك الذين سطروا هذا النجاح.\n\nوالسلام عليكم ورحمة الله وبركاته.\n\nعبدالله عبده الكريمي\nرئيس مجلس الإدارة" },
            { id: 10, title: "10. كلمة العضو المنتدب", content: "كلمة العضو المنتدب والرئيس التنفيذي\n\nالسادة المساهمون والعملاء الكرام،\n\nلقد كان عام 2025 عام \"التنفيذ الاستراتيجي\" بامتياز. لقد ركزت إدارتنا التنفيذية على هدف واحد: ترسيخ مكانة بنك الكريمي الإسلامي كبنك الشركات الأول (Top Corporate Bank) في اليمن. \n\nلقد قمنا بتطوير نموذج عملنا التشغيلي ليكون أكثر مرونة واستجابة لمعطيات السوق السريعة. كان تركيزنا منصباً على تعميق العلاقة مع المنظمات الدولية غير الحكومية (NGOs)، والشركات الكبرى، وتوفير حلول إدارة السيولة (Cash Management) المتطورة لهم. \n\nفي مجال التقنية، كان الإنجاز الأبرز هو الإطلاق المحدث لمنصة KIB IB، والتي أصبحت بمثابة فرع بنكي متكامل داخل مكاتب عملائنا، تتيح لهم إدارة التدفقات النقدية، وطلب فتح الاعتمادات، وإصدار الضمانات بضغطة زر وبمستوى أمان سيبراني غير مسبوق.\n\nكما نفخر بأننا استثمرنا بشكل مكثف في تطوير كوادرنا، لأننا نؤمن بأن الخدمة المصرفية المؤسسية تعتمد في المقام الأول على كفاءة الخبير المالي الذي يقدمها.\n\nسنستمر في تطوير حلولنا المالية لنبقى الشريك الذي يعتمد عليه كبار صناع القرار في عالم الأعمال.\n\nيوسف عبده محمد الكريمي\nنائب رئيس مجلس الإدارة - العضو المنتدب" },
            { id: 11, title: "11. قطاع تمويل الشركات", content: "قطاع تمويل الشركات (Corporate Financing)\n\nيمثل قطاع تمويل الشركات القلب النابض لعمليات بنك الكريمي الإسلامي. نحن نتجاوز مفهوم الإقراض التقليدي لنقدم \"شراكة استراتيجية\" تدعم نمو الشركات وتوسعها، مستندين إلى صيغ التمويل الإسلامي المتنوعة (المرابحة، المشاركة، المضاربة، الاستصناع، والإجارة المنتهية بالتمليك).\n\nأبرز إنجازات القطاع لعام 2025:\n- هيكلة التمويل الرأسمالي (CapEx): قمنا بتمويل إنشاء وتوسعة خطوط إنتاج لمصانع كبرى في مجالات الأغذية والأدوية والتعبئة، مما أسهم في تعزيز الصناعة الوطنية وتقليل الاعتماد على الواردات.\n- تمويل رأس المال العامل (Working Capital): تصميم خطوط ائتمان مرنة للشركات التجارية لدعم دورتها التشغيلية وتغطية احتياجاتها من المخزون، مما ساعدها على تجاوز أزمات تأخر سلاسل التوريد.\n- تمويل المقاولات ومشاريع البنية التحتية: تقديم حزم تمويلية متكاملة لشركات المقاولات الكبرى تشمل توفير السيولة، وإصدار خطابات الضمان (الابتدائية، النهائية، والدفعة المقدمة) بكفاءة وسرعة.\n\nلقد بلغت محفظة التمويلات الممنوحة للشركات [رقم] مليار ريال، بنسبة تعثر تقترب من الصفر، مما يعكس الجودة العالية لمعايير المنح والتحليل الائتماني الدقيق المتبع في البنك." },
            { id: 12, title: "12. التمويل المشترك", content: "التمويل المشترك والمشاريع الاستراتيجية\n(Syndicated Loans & Project Finance)\n\nتأكيداً لدور بنك الكريمي الإسلامي كلاعب رئيسي في القطاع المصرفي، بادر البنك خلال عام 2025 بقيادة والمشاركة في عدد من التحالفات المصرفية (Syndications) لتمويل مشاريع قومية كبرى تتجاوز قدرة البنك الواحد.\n\n- تمويل قطاعات الطاقة والاتصالات: ساهم البنك كمدير ومشارك في توفير تغطية مالية ضخمة لمشاريع استراتيجية في قطاعات الطاقة المتجددة، والاتصالات، وتطوير الموانئ.\n- توزيع المخاطر (Risk Distribution): يطبق البنك من خلال التمويل المشترك أحدث استراتيجيات توزيع المخاطر، مما يتيح توجيه السيولة الفائضة نحو مشاريع ذات عائد عالٍ ودرجة أمان قصوى، بالشراكة مع مؤسسات مالية زميلة.\n- إدارة التمويل (Facility Agent): بفضل بنيتنا التحتية التكنولوجية وفريقنا المتخصص، تم اختيار بنك الكريمي الإسلامي كوكيل لترتيب وإدارة بعض هذه القروض المشتركة، وهو ما يعكس ثقة القطاع المصرفي اليمني بقدراتنا وإمكانياتنا المؤسسية." },
            { id: 13, title: "13. قطاع التجارة الدولية", content: "التجارة الدولية والاعتمادات المستندية\n(Trade Finance)\n\nفي اقتصاد يعتمد بشكل كبير على الاستيراد، يُعد قطاع التجارة الدولية في البنك شريان الحياة للشركات اليمنية. نحن نقدم حلولاً متكاملة لتسهيل استيراد السلع الاستراتيجية كالمشتقات النفطية، القمح، السلع الأساسية، والأدوية.\n\nخدماتنا تشمل:\n- الاعتمادات المستندية (LCs): إصدار جميع أنواع الاعتمادات (الاطلاعية، المؤجلة، الدوارة) بتغطية من أقوى البنوك المراسلة العالمية، مع تقديم استشارات فنية لتجنب التناقضات المستندية.\n- التحصيلات المستندية (Documentary Collections): إدارة مستندات الشحن وتسوية المدفوعات بطريقة آمنة تضمن حقوق المستورد اليمني والمصدر الأجنبي.\n- تمويل التجارة الخارجية: توفير سيولة للمستوردين لدفع قيمة بضائعهم للموردين الخارجيين فوراً، ومنحهم فترات سداد مرنة تتناسب مع دورة المبيعات النقدية في السوق المحلي.\n\nخلال 2025، نفذ البنك حجم عمليات تجارية خارجية تجاوز 1.2 مليار دولار، مع الحفاظ على زمن تنفيذ قياسي بفضل نظام المعالجة المباشرة (STP) المربوط بشبكة السويفت الدولية." },
            { id: 14, title: "14. قطاع الخزينة والاستثمار", content: "قطاع الخزينة والاستثمار المالي\n(Treasury & Investment)\n\nيُعتبر قطاع الخزينة في بنك الكريمي الإسلامي العقل المدبر لإدارة السيولة وتحسين ربحية الأصول وحمايتها من تقلبات الأسواق. يعمل القطاع وفق استراتيجيات حصيفة توازن بين المخاطر والعوائد (Risk-Return Tradeoff).\n\nأنشطة الخزينة في 2025:\n- إدارة النقد الأجنبي (FX Management): تلبية احتياجات العملاء من الشركات والمنظمات من العملات الأجنبية بأسعار تنافسية، وتنفيذ عمليات مصارفة ضخمة لتغطية واردات السلع الأساسية، مع الالتزام التام بتعليمات البنك المركزي اليمني.\n- إدارة السيولة المحلية (Liquidity Management): توظيف السيولة الفائضة في أدوات استثمارية آمنة متوافقة مع الشريعة (مثل الصكوك الإسلامية، والوكالة بالاستثمار) لتحقيق عوائد مجزية لأصحاب حسابات الاستثمار.\n- التحوط (Hedging Strategies): في ظل تقلبات أسعار الصرف، يقدم القطاع استشارات وحلولاً متوافقة مع الشريعة لمساعدة الشركات الكبرى على التحوط ضد مخاطر تذبذب أسعار العملات، لحماية هوامش أرباحها.\n- العلاقات مع البنوك المراسلة: تقع على عاتق الخزينة مسؤولية استدامة وتوسيع خطوط الائتمان (Credit Lines) مع البنوك الدولية وتوزيع المراكز المالية لضمان أعلى درجات الأمان." },
            { id: 15, title: "15. المنظمات الدولية", content: "خدمات المنظمات الدولية غير الحكومية\n(NGOs & International Organizations)\n\nنظراً للوضع الإنساني الاستثنائي، يولي بنك الكريمي الإسلامي قطاع المنظمات الدولية والمحلية أهمية قصوى. نحن الشريك المصرفي الموثوق لأكبر وكالات الأمم المتحدة، والصناديق التنموية، والمنظمات الإغاثية العاملة في اليمن.\n\nحلولنا المخصصة للمنظمات:\n- إدارة حسابات المشاريع الإغاثية: فتح حسابات فرعية لادارة أموال المانحين بشفافية تامة ومطابقة مع متطلبات التدقيق الدولي.\n- المدفوعات الجماعية (Bulk Payments): تنفيذ تحويلات آلاف المستفيدين من المساعدات النقدية (Cash Transfers) وصرف مرتبات العاملين في الحقل الإنساني في وقت واحد وبضغطة زر عبر منصاتنا الآمنة.\n- تغطية نقدية شاملة: بفضل شبكتنا اللوجستية وقوة سيولتنا، نضمن توفير النقد (Cash in Vault) للمنظمات في أبعد المحافظات وأكثرها تعقيداً لتنفيذ مشاريعها الإنسانية دون تأخير.\n- تقارير وتسويات آنية: توفير تقارير مالية تفصيلية (Customized Reports) متوافقة مع صيغ المنظمات الدولية لتسهيل عمليات التتبع المالي والمراجعة الدورية." },
            { id: 16, title: "16. التحول الرقمي", content: "التحول الرقمي والابتكار (Digital Transformation)\n\nالرقمنة في بنك الكريمي الإسلامي ليست مجرد مواكبة للتقنية، بل هي \"إعادة هندسة لقيمة الأعمال\". في 2025، انتقل البنك من مرحلة تحديث الأنظمة إلى مرحلة \"التمكين الرقمي للشركات\".\n\nمحاور التحول التقني 2025:\n- البنية التحتية السحابية (Cloud Infrastructure): ترحيل جزئي للخدمات غير الأساسية إلى بيئات سحابية هجينة ومؤمنة بالكامل، لضمان استمرارية الأعمال (BCP) ورفع نسبة التوافرية إلى 99.99%.\n- الذكاء الاصطناعي (AI & Data Analytics): استخدام أدوات تحليل البيانات الضخمة لدراسة سلوك الشركات التمويلي، وتقديم عروض ائتمانية استباقية بناءً على تحليل التدفقات النقدية.\n- أتمتة العمليات الآلية (RPA): تم تطبيق الروبوتات البرمجية لتنفيذ المهام المتكررة في إدارة العمليات (Back Office)، مما أدى لتقليص زمن معالجة الاعتمادات والحوالات بنسبة 60% وخفض نسبة الأخطاء البشرية إلى الصفر.\n- تحديث مركز البيانات (Data Center): افتتح البنك مركز بياناته الرئيسي الجديد والمصمم وفق معايير Tier III العالمية، لضمان أقصى درجات الأداء والأمان لأنظمة البنك الأساسية." },
            { id: 17, title: "17. منصة KIB IB", content: "منصة KIB IB المتقدمة لقطاع الأعمال\n\nتعتبر منصة (KIB IB) درة التاج في خدماتنا الرقمية الموجهة للشركات. لقد تم تصميمها لتكون \"غرفة عمليات مالية\" متكاملة داخل مكتب المدير المالي في كل شركة.\n\nمميزات المنصة الاستثنائية:\n- إدارة السيولة اللحظية (Real-time Cash Management): رؤية بانورامية شاملة لجميع حسابات الشركة وفروعها، مع إمكانية تحويل الأموال بينها برمشة عين.\n- إدارة التجارة الدولية عن بعد: لأول مرة، يمكن للشركات تقديم طلبات فتح الاعتمادات المستندية، وإرفاق المستندات المطلوبة، ومتابعة حالة الشحن والمراسلات عبر المنصة دون الحاجة لزيارة فرع البنك.\n- المدفوعات المجمعة والرواتب (Payroll): نظام آلي متكامل لرفع ملفات رواتب آلاف الموظفين أو سداد مستحقات الموردين وتشفيرها، وتنفيذها فوراً بضغطة زر واحدة من المخولين.\n- مستويات صلاحية معقدة (Maker-Checker): تتيح المنصة للشركة تخصيص صلاحيات الاستعلام، الإدخال، والموافقة المتعددة حسب هيكلها التنظيمي الإداري، لضمان أعلى درجات الرقابة الداخلية." },
            { id: 18, title: "18. التقنيات المفتوحة", content: "الخدمات المصرفية المفتوحة (Open Banking) و واجهات الربط (APIs)\n\nاستشرافاً لمستقبل الصناعة المصرفية العالمية، أطلق بنك الكريمي الإسلامي حزمة واجهات برمجة التطبيقات (APIs) المخصصة لكبار العملاء، ليكون رائداً في هذا المجال في السوق المحلي.\n\nما هو الربط البرمجي (B2B APIs) للشركات؟\nهو تقنية تتيح ربط النظام المحاسبي للشركة (مثل SAP, Oracle, ERP) بشكل مباشر وآمن ومشفّر مع النظام الأساسي لبنك الكريمي الإسلامي، مما يحقق الفوائد التالية للشركة:\n- التسويات الآلية (Auto Reconciliation): تسوية كشوفات الحسابات فورياً ودون تدخل بشري، مما يوفر آلاف الساعات على أقسام المحاسبة.\n- تنفيذ الدفعات من داخل نظام الشركة: لا حاجة للدخول لتطبيق البنك؛ يمكن للمدير المالي إصدار أمر الدفع من نظام الشركة، ليصل إلى البنك ويُنفذ في أجزاء من الثانية.\n- الاستعلام اللحظي: جلب بيانات الأرصدة وحركات الحسابات وتضمينها في لوحات المعلومات الإدارية (Dashboards) الخاصة بالشركة.\n\nإن هذه الخدمة المتقدمة هي التي تجعل من البنك الخيار الأول للشركات الكبرى ذات الحركات المالية الكثيفة." },
            { id: 19, title: "19. الاستدامة (ESG)", content: "تقرير الاستدامة والحوكمة البيئية والاجتماعية\n(ESG Report)\n\nتماشياً مع التوجهات العالمية للمؤسسات المالية الكبرى، يتبنى بنك الكريمي الإسلامي معايير (ESG) - البيئة، المجتمع، والحوكمة - كجزء أصيل من استراتيجيته التشغيلية والتمويلية.\n\n1. البيئة (Environmental):\n- التمويل الأخضر (Green Finance): قمنا بتوجيه جزء كبير من محفظتنا الائتمانية لتمويل مشاريع الطاقة الشمسية للشركات والمصانع الكبرى، لتقليل الاعتماد على الوقود الأحفوري وخفض الانبعاثات الكربونية.\n- عمليات بنكية خضراء: أدت رقمنة الخدمات (عبر KIB IB والربط البرمجي) إلى توفير استهلاك ملايين الأوراق سنوياً، وتخفيض البصمة الكربونية للبنك ولعملائه.\n\n2. المجتمع (Social):\n- الشمول المالي وخلق الوظائف: من خلال تمويل المصانع والمشاريع الكبيرة، نساهم بشكل غير مباشر في خلق آلاف فرص العمل المباشرة وغير المباشرة للشباب اليمني.\n- بيئة عمل نموذجية: نوفر لموظفينا بيئة عمل آمنة، محفزة، وقائمة على المساواة وتكافؤ الفرص، مع تقديم تغطية تأمينية وصحية شاملة.\n\n3. الحوكمة (Governance):\n- مجلس إدارة مستقل وهياكل رقابية تضمن الشفافية والعدالة وحماية حقوق الأقليات من المساهمين، مع الالتزام التام بالقيم الأخلاقية." },
            { id: 20, title: "20. المسؤولية المجتمعية", content: "المسؤولية المجتمعية (CSR)\n\nإيماناً منا بأن نمو البنك ونجاحه يرتبط ارتباطاً وثيقاً بتعافي ونمو المجتمع الذي يعمل فيه، خصص بنك الكريمي الإسلامي جزءاً من أرباحه وجهوده لدعم المبادرات المجتمعية المؤثرة والمستدامة خلال عام 2025.\n\nأبرز مجالات الدعم المجتمعي:\n- دعم قطاعي الصحة والتعليم: المساهمة في تجهيز المستشفيات الحكومية وتوفير أجهزة غسيل الكلى، ودعم مبادرات تعليمية لتأهيل الطلاب في تخصصات التكنولوجيا والاقتصاد.\n- الإغاثة وتنمية المجتمع: الشراكة مع المؤسسات الإغاثية لتوزيع السلال الغذائية وتوفير المياه النظيفة للمخيمات والمناطق المتضررة.\n- تمكين الشباب ورواد الأعمال: رغم أن تخصصنا هو الشركات الكبرى، إلا أننا ندعم البرامج التدريبية والحاضنات التي تنمي قدرات رواد الأعمال الشباب ليصبحوا قادة شركات المستقبل.\n\nإن بنك الكريمي الإسلامي ليس مجرد كيان ربحي، بل هو مؤسسة وطنية مسؤولة، تستثمر في الإنسان والأرض، لضمان مستقبل أفضل للأجيال القادمة." },
            { id: 21, title: "21. رأس المال البشري", content: "رأس المال البشري وصناعة القادة\n(Human Capital Management)\n\nفي عالم الخدمات المصرفية للشركات، التميز لا يأتي من التقنية وحدها، بل من \"العقول المصرفية\" التي تديرها. لذا، يُعد موظفونا هم أثمن أصولنا وأهم ميزاتنا التنافسية.\n\nخلال 2025، نفذنا استراتيجية \"صناعة قادة العمل المصرفي\":\n- الاستقطاب الموجه: جذب الكفاءات الاستثنائية والخبرات النادرة في مجالات تحليل الائتمان المؤسسي، الخزينة، وإدارة المخاطر.\n- التدريب النوعي والشهادات المهنية: استثمر البنك في تدريب وتأهيل أكثر من 90% من موظفيه. ركزنا على حصول كوادرنا على شهادات دولية متخصصة مثل CAMS (مكافحة غسل الأموال)، CDCS (الاعتمادات المستندية)، و PMP، بالتعاون مع معاهد مصرفية دولية.\n- تقييم الأداء والمكافآت (KPIs): تطبيق نظام متطور وموضوعي لتقييم الأداء، يربط الحوافز والمكافآت بالإنتاجية وتحقيق الأهداف الاستراتيجية ورضا العملاء.\n- مسارات التطور الوظيفي (Career Pathing): تبنينا برامج لتهيئة الصف الثاني من القيادات (Succession Planning) لضمان استمرارية القيادة بنفس الكفاءة والرؤية." },
            { id: 22, title: "22. المرأة في القيادة", content: "تمكين المرأة في القطاع المصرفي\n(Women in Leadership)\n\nيفتخر بنك الكريمي الإسلامي بكونه في طليعة المؤسسات الوطنية التي تدعم وتمكن المرأة المهنية للوصول إلى مواقع اتخاذ القرار، إيماناً منا بأن التنوع المكتسب من مشاركة المرأة يضيف قيمة استراتيجية وابتكارية لعمليات البنك.\n\nإنجازات البنك في تمكين المرأة لعام 2025:\n- زيادة التمثيل: ارتفعت نسبة الموظفات في البنك إلى مستويات غير مسبوقة، لا سيما في الأقسام المتخصصة كالبحوث والدراسات، الامتثال، وتقنية المعلومات.\n- القيادة والإدارة: تم ترقية العديد من الكفاءات النسائية لتولي مناصب إدارية وسطى وعليا، ومراكز قيادية كإدارة الفروع وقطاعات التخطيط والتطوير.\n- بيئة عمل داعمة: توفير ساعات عمل مرنة وامتيازات خاصة تتيح للمرأة العاملة الموازنة بين متطلبات العمل المليئة بالتحديات ومسؤولياتها الأسرية.\n- برامج القيادة النسائية: إطلاق برنامج تدريبي حصري مخصص لصقل المهارات القيادية والتفاوضية للموظفات المتميزات لإعدادهن للأدوار التنفيذية العليا." },
            { id: 23, title: "23. إدارة المخاطر", content: "إدارة المخاطر المؤسسية\n(Enterprise Risk Management - ERM)\n\nإن الحفاظ على مركز مالي صلب يستدعي وجود درع واقٍ يحمي البنك وأموال المودعين من أي صدمات خارجية أو أخطاء داخلية. يطبق البنك إطاراً متكاملاً لإدارة المخاطر المؤسسية متوافقاً مع أفضل الممارسات الدولية ومقررات لجنة بازل.\n\nمنهجية إدارة المخاطر لعام 2025:\n- مخاطر الائتمان (Credit Risk): تطبيق نماذج تحليل ائتماني متقدمة لقياس الجدارة الائتمانية للشركات والتصنيف الداخلي (Internal Rating)، مع توزيع مدروس للمحفظة لتجنب التركز الائتماني في قطاع محدد.\n- مخاطر السوق والسيولة (Market & Liquidity Risk): إجراء اختبارات تحمل (Stress Testing) دورية وصارمة تحت سيناريوهات اقتصادية قاسية، للتأكد من قدرة البنك على الوفاء بالتزاماته في أسوأ الظروف، وإدارة الفجوات في السيولة والعملات الأجنبية باحترافية.\n- المخاطر التشغيلية (Operational Risk): تحديث سجل المخاطر (Risk Register) لكل إدارة وتفعيل ضوابط الرقابة المانعة والكاشفة للحد من أي خسائر ناتجة عن قصور في العمليات أو الأنظمة أو الأفراد." },
            { id: 24, title: "24. الأمن السيبراني", content: "الأمن السيبراني وحماية البيانات\n(Cybersecurity & Data Privacy)\n\nمع تزايد الاعتماد على القنوات الرقمية والخدمات المصرفية المفتوحة (APIs)، أصبح الأمن السيبراني أولوية قصوى لمجلس الإدارة. البنك لا يتنازل إطلاقاً عن تأمين وحماية بيانات وحسابات كبار عملائه السريّة.\n\nاستراتيجية الحصانة السيبرانية 2025:\n- مركز عمليات أمن المعلومات (SOC): يعمل على مدار الساعة طوال أيام الأسبوع (24/7) باستخدام تقنيات الذكاء الاصطناعي لرصد وتحليل واكتشاف أي محاولات اختراق أو سلوك شاذ في الشبكة وصدها في أجزاء من الثانية.\n- التشفير المتقدم والمصادقة المتعددة (MFA): جميع البيانات المنقولة والمخزنة مشفرة بأحدث خوارزميات التشفير العالمية، وتتطلب عمليات KIB IB مصادقات متعددة العوامل لحماية أموال الشركات.\n- اختبارات الاختراق (Penetration Testing): الاستعانة بشركات أمن سيبراني عالمية مستقلة لإجراء هجمات محاكاة دورية لاختبار صلابة أنظمة وتطبيقات البنك وإغلاق أي ثغرات محتملة.\n- التوعية المستمرة: رفع الوعي الأمني للموظفين والعملاء لحمايتهم من أساليب الهندسة الاجتماعية والتصيد الاحتيالي." },
            { id: 25, title: "25. الالتزام ومكافحة الغسل", content: "الالتزام ومكافحة غسل الأموال\n(Compliance & AML/CFT)\n\nيعتبر الامتثال التام للقوانين واللوائح خط الدفاع الأول لبنك الكريمي الإسلامي لضمان بقائه في النظام المالي العالمي. نحن نعمل وفق سياسة \"عدم التسامح مطلقاً\" (Zero Tolerance) مع أي أنشطة مالية مشبوهة.\n\nمنظومة الالتزام لعام 2025:\n- تحديث السياسات والأنظمة: تم تحديث دليل الامتثال وفقاً لأحدث توجيهات البنك المركزي اليمني وتوصيات مجموعة العمل المالي الدولية (FATF).\n- أنظمة المراقبة والفلترة الآلية: الاعتماد على أحدث الأنظمة العالمية المعتمدة لمراقبة العمليات وفلترة أسماء العملاء والحوالات بشكل آلي ضد القوائم السوداء وقوائم العقوبات الدولية (مثل OFAC و UN).\n- اعرف عميلك للشركات (Corporate KYC & UBO): تطبيق إجراءات العناية الواجبة المشددة (EDD) للتعرف الدقيق على الهياكل القانونية للشركات، ومعرفة المستفيد الحقيقي (UBO) قبل فتح الحسابات أو تقديم التمويلات.\n- تدريب متقدم: إخضاع جميع الموظفين، خاصة في الصفوف الأمامية وخدمة الشركات، لتدريبات مكثفة حول كيفية اكتشاف الأنماط المشبوهة للعمليات والإبلاغ الفوري عنها." },
            { id: 26, title: "26. الحوكمة المؤسسية", content: "الحوكمة المؤسسية\n(Corporate Governance)\n\nيطبق بنك الكريمي الإسلامي أفضل ممارسات الحوكمة الرشيدة التي تضمن الفصل الواضح بين الملكية والإدارة التنفيذية، وتفعيل دور الرقابة والمساءلة، لحماية مصالح جميع الأطراف ذوي العلاقة (المساهمين، المودعين، الموظفين، والجهات الرقابية).\n\nركائز الحوكمة في البنك:\n- مجلس إدارة قوي ومستقل: يضم المجلس خبرات مالية واقتصادية عريقة، يتولى رسم الاستراتيجية العامة ومراقبة الإدارة التنفيذية لضمان عدم الحياد عن الأهداف.\n- الشفافية والإفصاح: التزام كامل بنشر القوائم المالية والتقارير السنوية بشفافية ومصداقية، وعرضها على الجمعية العمومية والمجتمع.\n- المراجعة الداخلية (Internal Audit): تعمل إدارة المراجعة الداخلية باستقلالية تامة (تتبع مجلس الإدارة مباشرة)، لتقييم فعالية أنظمة الرقابة الداخلية وإدارة المخاطر والتأكد من التزام جميع الإدارات بالسياسات المعتمدة.\n- سياسة تعارض المصالح والنزاهة: تطبيق سياسات صارمة تمنع تعارض المصالح وتنظم عمليات الإبلاغ عن المخالفات (Whistleblowing) لضمان نزاهة العمليات الإدارية والمالية." },
            { id: 27, title: "27. لجان مجلس الإدارة", content: "اللجان المنبثقة عن مجلس الإدارة\n(Board Committees)\n\nلضمان فاعلية ودقة الرقابة والإشراف، شكل مجلس الإدارة مجموعة من اللجان المتخصصة التي تناط بها مهام دراسة ومتابعة الجوانب الدقيقة لأعمال البنك ورفع التوصيات، وهي:\n\n1. لجنة المراجعة (Audit Committee):\nتشرف على كفاءة المراجعة الداخلية، وتنسق مع المدقق الخارجي، وتتأكد من نزاهة وشفافية التقارير المالية للبنك والالتزام بالقوانين الرقابية.\n\n2. لجنة إدارة المخاطر (Risk Management Committee):\nتراقب بيئة المخاطر الكلية للبنك، وتقر سياسات وحدود المخاطر (الائتمانية، السوقية، التشغيلية)، وتتأكد من قدرة البنك على مواجهة الأزمات المحتملة.\n\n3. لجنة التسهيلات الائتمانية للشركات الكبرى (Credit Committee):\nتختص بمراجعة واعتماد التمويلات والتسهيلات الائتمانية الضخمة والمشتركة (التي تتجاوز صلاحيات الإدارة التنفيذية)، والتأكد من توافقها مع الاستراتيجية الائتمانية للبنك.\n\n4. لجنة الترشيحات والمكافآت (Nomination & Remuneration Committee):\nتتولى وضع سياسات التعيين للإدارة العليا، وتقييم أداء المدراء التنفيذيين، واعتماد هيكل الرواتب والمكافآت لضمان استقطاب الكفاءات والحفاظ عليها." },
            { id: 28, title: "28. تقرير الهيئة الشرعية", content: "تقرير هيئة الرقابة الشرعية 2025\n\nالتقرير السنوي السادس لهيئة الرقابة الشرعية في بنك الكريمي الإسلامي للعام 2025م\n\nإلى مساهمي وعملاء بنك الكريمي الإسلامي،،،، السلام عليكم ورحمة الله وبركاته\nالحمد لله رب العالمين والصلاة والسلام على سيدنا محمد وعلى آله وصحبه أجمعين، أما بعد:\n\nلقد قمنا بمراجعة واعتماد السياسات والاتفاقيات، المنتجات، والخدمات المصرفية التي قدمها البنك لقطاع الشركات والأفراد خلال العام المالي 2025م. وتأكدنا من خلال المراجعة الواجبة لعمليات البنك (عن طريق التدقيق الشرعي الداخلي والمتابعة المستمرة) من التزام البنك المطلق بمبادئ وأحكام الشريعة الإسلامية.\n\nخلصت الهيئة إلى ما يلي:\nأولاً: أن كافة عقود التمويلات الكبرى والمشتركة، والاعتمادات المستندية، وعمليات الخزينة والاستثمار تمت الموافقة عليها وإبرامها وفقاً للضوابط الشرعية المعتمدة.\nثانياً: آلية توزيع الأرباح على حسابات الاستثمار تمت بناءً على أساس المضاربة والمشاركة الشرعية المقرة من قبلنا.\nثالثاً: آلية حساب الزكاة تتوافق مع المعايير الشرعية لهيئة (AAOIFI).\n\nنشكر الإدارة التنفيذية وموظفي البنك على التزامهم بالعمل المصرفي الإسلامي النقي.\n\nأعضاء الهيئة:\n- د. سعد عبد الله الأقرع (رئيس الهيئة)\n- د. محمد سعد نجاد (عضو الهيئة)\n- أ. أحمد الجواني (عضو الهيئة)\n- أ. محمد أحمد البكيلي (المراقب الشرعي التنفيذي)" },
            { id: 29, title: "29. تقرير مدقق الحسابات", content: "تقرير مدقق الحسابات المستقل لعام 2025\n\nإلى السادة مساهمي بنك الكريمي الإسلامي (ش.م. ي.م مقفلة)\n\nالرأي:\nقمنا بتدقيق القوائم المالية لبنك الكريمي الإسلامي والتي تتكون من قائمة المركز المالي كما في 31 ديسمبر 2025، وقائمة الدخل الشامل، وقائمة التدفقات النقدية، وقائمة التغيرات في حقوق المساهمين للسنة المنتهية في ذلك التاريخ، والإيضاحات المرفقة.\n\nبرأينا، إن القوائم المالية المرفقة تُظهر بصورة عادلة، من كافة النواحي الجوهرية، المركز المالي للبنك كما في 31 ديسمبر 2025، وأداءه المالي وتدفقاته النقدية للسنة المنتهية في ذلك التاريخ، وفقاً لمعايير المحاسبة المالية الصادرة عن هيئة المحاسبة والمراجعة للمؤسسات المالية الإسلامية (AAOIFI)، ووفقاً لتعليمات البنك المركزي اليمني.\n\nأساس الرأي:\nتمت عملية التدقيق وفقاً للمعايير الدولية للمراجعة. نحن مستقلون عن البنك وفقاً لقواعد السلوك الأخلاقي المهني. ونعتقد أن أدلة المراجعة التي حصلنا عليها كافية ومناسبة لتوفير أساس لرأينا.\n\nكما نؤكد أن البنك يحتفظ بسجلات محاسبية منتظمة، ولم تقع خلال العام أي مخالفات جوهرية لأحكام القوانين النافذة والمنظمة للعمل المصرفي في الجمهورية اليمنية تؤثر على مركزه المالي.\n\n(اسم شركة التدقيق / المحاسب القانوني)\nصنعاء، الجمهورية اليمنية\nأبريل 2026" },
            { id: 30, title: "30. قائمة المركز المالي", content: "القوائم المالية (Financial Statements)\nقائمة المركز المالي (الميزانية العمومية) كما في 31 ديسمبر 2025\n(جميع المبالغ بآلاف الريالات اليمنية)\n\nالموجودات (Assets):\n- نقد وأرصدة لدى البنك المركزي اليمني\n- أرصدة لدى بنوك ومؤسسات مالية خارجية وداخلية\n- تمويلات المرابحة والمشاركة للشركات (صافي بعد المخصصات)\n- استثمارات مالية وإسلامية متاحة للبيع\n- موجودات ثابتة ومشروعات قيد التنفيذ\n- موجودات أخرى\nإجمالي الموجودات: [يتم إدراج الرقم النهائي لعام 2025]\n\nالمطلوبات (Liabilities):\n- أرصدة البنوك والمؤسسات المالية\n- الحسابات الجارية للعملاء (شركات ومنظمات)\n- تأمينات الاعتمادات المستندية وخطابات الضمان\n- مطلوبات أخرى ومخصصات\nإجمالي المطلوبات: [رقم]\n\nحقوق أصحاب حسابات الاستثمار المطلقة:\n- ودائع استثمارية وتوفير (بما فيها ودائع الشركات الكبرى): [رقم]\n\nحقوق الملكية (Equity):\n- رأس المال المدفوع\n- الاحتياطيات القانونية والعامة\n- الأرباح المبقاة\nإجمالي حقوق الملكية: [رقم]\n\nإجمالي المطلوبات وحقوق الاستثمار وحقوق الملكية: [يجب أن يطابق إجمالي الموجودات]" },
            { id: 31, title: "31. قائمة الدخل الشامل", content: "القوائم المالية (Financial Statements)\nقائمة الدخل الشامل للسنة المنتهية في 31 ديسمبر 2025\n(جميع المبالغ بآلاف الريالات اليمنية)\n\nالإيرادات التشغيلية:\n- إيرادات من التمويلات المشتركة والمؤسسية (مرابحة، مشاركة)\n- إيرادات من الاستثمارات المالية والودائع\n- إجمالي الإيرادات من التمويل والاستثمار\n- يخصم: عائد أصحاب حسابات الاستثمار والمودعين\n- صافي إيرادات التمويل والاستثمار: [رقم]\n\nإيرادات أخرى:\n- إيرادات العمولات والرسوم (اعتمادات، حوالات سويفت، خطابات ضمان)\n- أرباح صرف العملات الأجنبية (FX Gains)\n- إيرادات تشغيلية أخرى\nإجمالي الإيرادات التشغيلية: [رقم]\n\nالمصروفات:\n- مصاريف الموظفين والتدريب\n- مصاريف عمومية وإدارية وتقنية\n- إهلاك واستهلاك الأصول\n- مخصصات خسائر الائتمان المتوقعة (ECL)\nإجمالي المصروفات: [رقم]\n\nصافي الدخل للسنة (قبل الضريبة والزكاة): [رقم]\n- يخصم: الضرائب والزكاة المقدرة\n\nصافي الدخل الشامل للسنة المالية 2025: [يتم إدراج الرقم النهائي لعام 2025]" },
            { id: 32, title: "32. قائمة التدفقات النقدية", content: "القوائم المالية (Financial Statements)\nقائمة التدفقات النقدية للسنة المنتهية في 31 ديسمبر 2025\n(جميع المبالغ بآلاف الريالات اليمنية)\n\n1. التدفقات النقدية من الأنشطة التشغيلية:\n- صافي الدخل للسنة\n- تعديلات البنود غير النقدية (الإهلاك، المخصصات)\n- التغير في الموجودات التشغيلية (التمويلات، الأرصدة لدى البنوك)\n- التغير في المطلوبات التشغيلية (حسابات العملاء، التأمينات)\n- صافي النقد الناتج من الأنشطة التشغيلية: [رقم]\n\n2. التدفقات النقدية من الأنشطة الاستثمارية:\n- شراء موجودات ثابتة وأنظمة تقنية (Core Banking / KIB IB)\n- شراء أو بيع استثمارات مالية وإسلامية\n- صافي النقد المستخدم في الأنشطة الاستثمارية: [رقم]\n\n3. التدفقات النقدية من الأنشطة التمويلية:\n- التغير في ودائع أصحاب حسابات الاستثمار المطلقة للشركات\n- زيادة رأس المال (إن وجد)\n- توزيعات أرباح المساهمين عن العام السابق\n- صافي النقد الناتج من الأنشطة التمويلية: [رقم]\n\nصافي الزيادة (أو النقص) في النقد وما يعادله: [رقم]\nالنقد وما يعادله في بداية السنة: [رقم]\nالنقد وما يعادله في نهاية السنة (31 ديسمبر 2025): [رقم]" },
            { id: 33, title: "33. التغير في حقوق الملكية", content: "القوائم المالية (Financial Statements)\nقائمة التغيرات في حقوق الملكية للسنة المنتهية في 31 ديسمبر 2025\n(جميع المبالغ بآلاف الريالات اليمنية)\n\nتوضح هذه القائمة حركة رؤوس أموال المساهمين والاحتياطيات خلال العام، مما يعكس المتانة الرأسمالية للبنك وقدرته على دعم توسعه واستقطاب العمليات الكبرى.\n\nالرصيد في 1 يناير 2025:\n- رأس المال: [رقم]\n- الاحتياطي القانوني: [رقم]\n- الأرباح المبقاة: [رقم]\nإجمالي حقوق الملكية بداية العام: [رقم]\n\nالحركات خلال العام 2025:\n+ صافي الدخل الشامل للسنة المالية 2025\n- المحول إلى الاحتياطي القانوني (استقطاع إلزامي حسب قانون البنوك)\n- توزيعات الأرباح النقدية المعتمدة للمساهمين عن العام 2024\n\nالرصيد في 31 ديسمبر 2025:\n- رأس المال: [رقم]\n- الاحتياطي القانوني: [رقم]\n- الأرباح المبقاة: [رقم]\nإجمالي حقوق الملكية نهاية العام: [رقم]\n\n(يؤكد هذا النمو التراكمي قدرة بنك الكريمي الإسلامي على الاستمرار كشريك موثوق للشركات، مع تعظيم القيمة الاستثمارية لمساهميه بشكل مطرد ومستدام)." },
            { id: 34, title: "34. إيضاحات مالية (1-السياسات)", content: "إيضاحات حول القوائم المالية - الجزء الأول\n(Notes to the Financial Statements)\n\n1. معلومات عامة عن البنك:\nبنك الكريمي الإسلامي هو شركة مساهمة يمنية مقفلة، تأسس بموجب قانون المصارف الإسلامية. يركز نشاط البنك بشكل حصري على تقديم الخدمات والمنتجات المصرفية والاستثمارية والتجارية للشركات، المنظمات، وكبار العملاء، ولا يقدم خدمات التمويل الأصغر.\n\n2. أهم السياسات المحاسبية المتبعة:\n- أساس الإعداد: تم إعداد القوائم المالية وفقاً لمعايير هيئة (AAOIFI)، وفي حال عدم توفر معيار إسلامي، يتم الاسترشاد بالمعايير الدولية للتقارير المالية (IFRS) بما لا يتعارض مع الشريعة.\n- التمويلات الإسلامية: يتم تسجيل المرابحات عند المنح بتكلفة السلعة مضافاً إليها هامش الربح المتفق عليه. يتم تأجيل الأرباح غير المحققة وإثباتها على مدار فترات العقد.\n- العملات الأجنبية: يتم إثبات المعاملات بالعملات الأجنبية بأسعار الصرف السائدة وقت المعاملة. وتقيم الأرصدة في نهاية العام حسب نشرة أسعار الإقفال المعتمدة من البنك المركزي اليمني.\n- مخصصات خسائر الائتمان (ECL): يتم احتساب المخصصات وفقاً للمعيار المالي الإسلامي (FAS 30) المبني على التوقعات المستقبلية للخسائر الائتمانية للشركات." },
            { id: 35, title: "35. إيضاحات مالية (2-النقد)", content: "إيضاحات حول القوائم المالية - الجزء الثاني\n\n3. النقد والأرصدة لدى البنك المركزي اليمني:\nيحتفظ البنك باحتياطيات نقدية قوية (بالريال اليمني والعملات الأجنبية) لدى البنك المركزي كاحتياطي قانوني (Legal Reserve) وكأرصدة جارية لتسوية غرف المقاصة. يضمن هذا المستوى المرتفع من السيولة قدرة البنك الفورية على تلبية طلبات عملائه الكبار وصرف الحوالات الضخمة للمنظمات الدولية دون أي تأخير.\n\n4. الأرصدة لدى البنوك والمؤسسات المالية:\nتمثل هذه الأرصدة حسابات (Nostro) النشطة لدى شبكة واسعة من البنوك المراسلة من الدرجة الأولى (Tier-1) في مختلف القارات (آسيا، الشرق الأوسط، أوروبا). تستخدم هذه الأرصدة بالدرجة الأساسية لـ:\n- تغطية خطابات الاعتماد المستندية (LCs) لاستيراد بضائع الشركات اليمنية.\n- تسوية الحوالات الصادرة والواردة عبر نظام السويفت السريع.\nتتوزع هذه الأرصدة على عملات متعددة (دولار، يورو، ريال سعودي، درهم إماراتي) ومناطق جغرافية متنوعة لضمان توزيع المخاطر وتقليل مخاطر التركز (Concentration Risk)." },
            { id: 36, title: "36. إيضاحات مالية (3-التمويلات)", content: "إيضاحات حول القوائم المالية - الجزء الثالث\n\n5. التمويلات والاستثمارات للشركات (صافي):\nتعكس هذه المحفظة التوجه الاستراتيجي للبنك في قيادة قطاع الأعمال. تتكون المحفظة من:\n- تمويلات المرابحة: تستخدم بشكل مكثف لتمويل شراء الآلات والمواد الخام للشركات الصناعية والتجارية.\n- تمويلات المشاركة الاستراتيجية والمضاربة: تستخدم في حالات التمويل المشترك للمشاريع الكبرى وتطوير البنية التحتية.\n\nالتركز القطاعي للتمويلات:\nيحرص البنك على توزيع محفظته الائتمانية بذكاء لدعم الاقتصاد وتقليل المخاطر. تستحوذ قطاعات (الصناعات الغذائية والدوائية، الطاقة البديلة، التجارة العامة، والمقاولات) على النسبة الأكبر من التمويلات.\n\nجودة المحفظة والمخصصات:\nبفضل سياسات التحليل الائتماني الصارمة والضمانات القوية المأخوذة من كبار العملاء، تعتبر نسبة التمويلات المتعثرة (NPL) في البنك من أدنى النسب في القطاع المصرفي. ومع ذلك، قام البنك باقتطاع المخصصات اللازمة (ECL) التزاماً بمبدأ الحيطة والحذر ولحماية قوة مركزه المالي." },
            { id: 37, title: "37. إيضاحات مالية (4-الودائع)", content: "إيضاحات حول القوائم المالية - الجزء الرابع\n\n6. ودائع العملاء وحسابات الاستثمار المطلقة:\nيمثل هذا البند ثقة كبرى الشركات، المنظمات، والمؤسسات المالية ببنك الكريمي الإسلامي. وتتكون من:\n- الحسابات الجارية للشركات: أرصدة تشغيلية قوية تستخدم لتسوية المدفوعات والرواتب وفتح الاعتمادات المستندية، وتتميز بحركة نقدية يومية هائلة.\n- التأمينات النقدية: أرصدة محتجزة كضمانات جزئية أو كلية مقابل الاعتمادات المستندية وخطابات الضمان المصدرة لصالح الموردين وجهات التعاقد.\n- الودائع الاستثمارية: مبالغ ضخمة مودعة من قبل أفراد وشركات لفترات زمنية محددة (آجال متعددة) بهدف تحقيق عوائد شرعية استناداً لعقد المضاربة المطلقة. يتم خلط هذه الأموال مع أموال البنك وتوجيهها نحو استثمارات وتمويلات آمنة وذات جدوى اقتصادية عالية.\n\nيحرص البنك على تحقيق أعلى العوائد لمودعيه وتوزيع الأرباح بانتظام، مما يعزز من قدرته المستمرة على استقطاب الودائع المؤسسية (Wholesale Funding) لتدعيم خططه التوسعية." },
            { id: 38, title: "38. إيضاحات مالية (5-مخاطر)", content: "إيضاحات حول القوائم المالية - الجزء الخامس\n\n7. إدارة المخاطر والتقلبات الاقتصادية:\nفي ظل استمرار حالة عدم اليقين الاقتصادي وتقلبات أسعار الصرف التي يشهدها الاقتصاد اليمني، اتخذت الإدارة التنفيذية حزمة من الإجراءات والضوابط الصارمة لامتصاص أي تداعيات محتملة:\n- مخاطر سعر الصرف: يلتزم البنك بعدم الاحتفاظ بمراكز مفتوحة (Open Positions) عالية بالعملات الأجنبية، ويقوم بعمليات مطابقة مستمرة بين الأصول والخصوم بالعملات المختلفة (ALM) للتخفيف من تأثير تذبذب سعر الريال اليمني.\n- مخاطر السيولة: يراقب البنك يومياً نسب السيولة القانونية والتشغيلية، ويحتفظ بمحفظة من الأصول السائلة (Liquid Assets) القابلة للتحويل إلى نقد بسرعة لمواجهة أي سحوبات طارئة أو التزامات مفاجئة.\n- تقييم الأحداث السياسية والأمنية: (كما أشار تقرير مدقق الحسابات المستقل) يتابع البنك باستمرار تأثير الأوضاع الاستثنائية للبلاد، ويقوم بعمل اختبارات تحمل (Stress Tests) دورية تضمن استمرارية الأعمال والحفاظ على متانة رأس المال في مختلف السيناريوهات." },
            { id: 39, title: "39. الجوائز والتقديرات", content: "الجوائز والتقديرات لعام 2025\n(Awards & Recognitions)\n\nإن النجاح الاستثنائي لبنك الكريمي الإسلامي في قيادة قطاع الأعمال وتمكين الشركات اليمنية لم يمر دون ملاحظة من قبل المؤسسات المالية ومؤسسات التقييم الإقليمية والدولية. \n\nخلال عام 2025، توج البنك بجوائز تعكس التزامه بالتميز:\n\n1. جائزة \"أفضل بنك للشركات في اليمن 2025\" (Best Corporate Bank in Yemen):\nتقديراً لحلول التمويل المبتكرة، وحجم العمليات التجارية الدولية التي نفذها البنك لدعم استقرار سلاسل الإمداد في السوق اليمني.\n\n2. جائزة \"التميز في التحول الرقمي المؤسسي\" (Excellence in Corporate Digital Transformation):\nتتويجاً لإطلاق منصة KIB IB المحدثة وتفعيل واجهات الربط البرمجي (APIs) مع أنظمة الشركات الكبرى، كأول بنك يمني يقدم هذه الخدمة المتطورة لكبار العملاء.\n\n3. شهادات شكر وتقدير من البنوك المراسلة:\nتلقى البنك رسائل إشادة وتقييمات امتياز عليا من كبرى البنوك المراسلة في أوروبا وآسيا، نظير التزامه المطلق بتطبيق أعلى معايير مكافحة غسل الأموال (AML) والدقة المتناهية في تنفيذ العمليات التجارية ومعالجات الـ (STP).\n\nهذه الجوائز ليست سوى دافع لنا لرفع سقف التوقعات والاستمرار في الريادة." },
            { id: 40, title: "40. بيانات الفروع (الغلاف الخلفي)", content: "شبكة مراكز الأعمال وفروع خدمات الشركات الكبرى\n(Corporate Branches Network)\n\nخصصنا أفضل الفروع ومراكز الأعمال لخدمة عملائنا من قطاع الشركات والمنظمات، مزودة بكوادر مؤهلة لتقديم استشارات وخدمات سريعة:\n\n- عدن (الإدارة العامة والفرع الرئيسي): شارع الملكة أروى - هاتف: 02/256144\n- صنعاء (مركز أعمال الشركات): شارع عمان - هاتف: 01/537779\n- صنعاء (فرع شعوب): هاتف: 01/564273\n- صنعاء (فرع شارع تعز): هاتف: 01/600603\n- حضرموت / المكلا (مركز الأعمال): حي الشرج - هاتف: 05/352853\n- تعز (فرع جمال): شارع جمال - هاتف: 04/260272\n- تعز (فرع الحوبان): هاتف: 04/291556\n- الحديدة (الفرع التجاري): شارع الميناء - هاتف: 03/245361\n- إب (فرع الدائري): هاتف: 04/459003\n- مأرب (فرع الأعمال): شارع عدن - هاتف: 06/302188\n- ذمار (الفرع الرئيسي): شارع صنعاء - هاتف: 06/428015\n\nتواصلوا معنا عبر:\nالبريد الإلكتروني للإدارة العامة: info@kibanks.com\nالموقع الرسمي وبوابة KIB IB الإلكترونية: www.kibanks.com\n\nبنك الكريمي الإسلامي - شريك استراتيجي لتمكين طموحاتك الكبرى." }
        ];

        // المتغيرات
        let currentPageIndex = 0;
        let isEditing = false;

        // عناصر واجهة المستخدم
        const viewContainer = document.getElementById('view-container');
        const editContainer = document.getElementById('edit-container');
        const editor = document.getElementById('editor');
        const pageIndicator = document.getElementById('page-indicator');
        const sidebarMenu = document.getElementById('sidebar-menu');
        const btnEdit = document.getElementById('btn-edit');
        const editIconContainer = document.getElementById('edit-icon-container');
        const editText = document.getElementById('edit-text');

        // بناء الفهرس الجانبي
        function buildSidebar() {
            sidebarMenu.innerHTML = reportData.map((page, index) => `
                <li>
                    <button onclick="goToPage(${index})" 
                            class="w-full text-right px-4 py-3 rounded-lg text-sm font-bold transition-all flex items-center justify-between
                            ${index === currentPageIndex ? 'bg-[#F2A900] text-gray-900 shadow-md' : 'text-gray-300 hover:bg-gray-800 hover:text-white'}">
                        <span class="truncate pr-2">${page.title}</span>
                        ${index === currentPageIndex ? '<i data-lucide="chevron-left" class="w-4 h-4"></i>' : ''}
                    </button>
                </li>
            `).join('');
            lucide.createIcons();
        }

        // الانتقال لصفحة محددة
        function goToPage(index) {
            currentPageIndex = index;
            isEditing = false;
            renderPage();
            buildSidebar();
            
            // تمرير الفهرس ليكون الزر النشط ظاهراً
            const activeButton = sidebarMenu.children[index];
            if(activeButton) {
                activeButton.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // تحديث واجهة المستخدم (الورقة)
        function renderPage() {
            const page = reportData[currentPageIndex];
            pageIndicator.innerText = `صفحة ${page.id} من ${reportData.length}`;

            if (isEditing) {
                viewContainer.classList.add('hidden');
                editContainer.classList.remove('hidden');
                
                if (editor.value !== page.content) {
                    editor.value = page.content;
                }
                
                btnEdit.className = "flex items-center gap-2 px-5 py-2.5 rounded-lg font-bold transition-all bg-green-600 hover:bg-green-700 text-white shadow-sm";
                editIconContainer.innerHTML = '<i data-lucide="save" class="w-5 h-5"></i>';
                editText.innerText = 'حفظ التعديلات';
            } else {
                viewContainer.classList.remove('hidden');
                editContainer.classList.add('hidden');
                
                btnEdit.className = "flex items-center gap-2 px-5 py-2.5 rounded-lg font-bold transition-all bg-gray-100 hover:bg-gray-200 text-gray-800 shadow-sm border border-gray-200";
                editIconContainer.innerHTML = '<i data-lucide="edit-3" class="w-5 h-5"></i>';
                editText.innerText = 'تعديل المحتوى';

                // تصميم خاص للغلاف
                if (page.id === 1) {
                    viewContainer.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full text-center space-y-10 pt-10">
                           <img src="Asset 1.png" alt="KIB Logo" class="h-28 mb-4 drop-shadow-md" onerror="this.style.display='none'" />
                           <h1 class="text-5xl font-black text-[#7A1B29] drop-shadow-sm">التقرير السنوي</h1>
                           <h2 class="text-4xl text-gray-400 font-light tracking-[0.2em] uppercase">Annual Report</h2>
                           <div class="w-40 h-1.5 bg-[#F2A900] mx-auto rounded-full"></div>
                           <h3 class="text-7xl font-black text-gray-800 drop-shadow-md">2025</h3>
                           <div class="mt-16 bg-gray-50/80 p-8 rounded-2xl border border-gray-100 w-full">
                              <h4 class="text-2xl font-bold text-[#F2A900] mb-2">قيادة التحول المالي لقطاع الأعمال</h4>
                              <p class="text-sm text-gray-500 uppercase tracking-widest mb-6">Driving Financial Transformation for Business</p>
                              <h4 class="text-3xl font-black text-[#7A1B29] mb-1">بنك الكريمي الإسلامي</h4>
                              <p class="text-lg text-gray-600 font-bold mb-4">AlKuraimi Islamic Bank</p>
                              <p class="inline-block bg-[#7A1B29] text-white px-6 py-2 rounded-full font-bold shadow-md">Corporate & Investment Banking</p>
                           </div>
                        </div>
                    `;
                } else {
                    // معالجة العناوين داخل النص لإعطائها مظهر جذاب تلقائياً
                    let formattedContent = page.content
                        .replace(/\n\n/g, '<br><br>')
                        .replace(/\n/g, '<br>')
                        // تمييز العناوين الرئيسية (أول سطر غالبا)
                        .replace(/^(.+?)<br>/, '<h2 class="text-2xl font-black text-[#7A1B29] border-b-2 border-[#F2A900] pb-2 inline-block mb-4">$1</h2><br>')
                        // تمييز النقاط
                        .replace(/- (.*?)(<br>|$)/g, '<div class="flex items-start gap-2 mb-2"><div class="mt-3.5 w-2 h-2 rounded-full bg-[#F2A900] shrink-0"></div><span>$1</span></div>');
                    
                    viewContainer.innerHTML = formattedContent;
                }
            }
            lucide.createIcons();
        }

        // تبديل وضع التعديل
        function toggleEdit() {
            isEditing = !isEditing;
            renderPage();
        }

        // تحديث البيانات
        function updateContent(value) {
            reportData[currentPageIndex].content = value;
        }

        // الطباعة وتصدير PDF (40 صفحة كاملة)
        function handlePrint() {
            const printContainer = document.getElementById('print-container');
            
            printContainer.innerHTML = reportData.map(page => `
                <div class="bg-white relative overflow-hidden print-page" style="padding: 25mm 20mm; box-sizing: border-box;">
                    
                    <div class="absolute inset-0 flex justify-center items-center opacity-[0.02] pointer-events-none">
                        <h1 class="text-[250px] font-black text-[#7A1B29] transform -rotate-45">KIB</h1>
                    </div>
                    <div class="absolute top-0 left-0 w-full h-3 bg-[#7A1B29]"></div>
                    <div class="absolute top-0 left-0 w-1/3 h-3 bg-[#F2A900]"></div>

                    <div class="flex justify-between items-center mb-8 border-b border-gray-200 pb-4 relative z-10">
                       <h2 class="text-[#7A1B29] font-black text-xl flex items-center gap-3">
                           <img src="Asset 1.png" class="h-8" onerror="this.style.display='none'">
                           بنك الكريمي الإسلامي <span class="text-sm font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded">قطاع الشركات الكبرى</span>
                       </h2>
                       <span class="text-[#F2A900] font-black">التقرير السنوي 2025</span>
                    </div>

                    <div class="font-medium text-[16px] text-gray-900 leading-[2.2] relative z-10">
                       ${page.id === 1 ? `
                        <div class="flex flex-col items-center justify-center pt-24 text-center space-y-10">
                           <img src="Asset 1.png" alt="KIB Logo" class="h-32 mb-6" onerror="this.style.display='none'" />
                           <h1 class="text-5xl font-black text-[#7A1B29]">التقرير السنوي</h1>
                           <h2 class="text-3xl text-gray-400 font-light tracking-[0.2em] uppercase">Annual Report</h2>
                           <div class="w-40 h-1.5 bg-[#F2A900] mx-auto rounded-full"></div>
                           <h3 class="text-7xl font-black text-gray-800">2025</h3>
                           <div class="mt-20 pt-10 border-t border-gray-200 w-full">
                              <h4 class="text-2xl font-bold text-[#F2A900] mb-2">قيادة التحول المالي لقطاع الأعمال</h4>
                              <h4 class="text-4xl font-black text-[#7A1B29] mt-6 mb-2">بنك الكريمي الإسلامي</h4>
                              <p class="text-xl text-gray-600 font-bold mb-6">AlKuraimi Islamic Bank</p>
                              <p class="inline-block bg-[#7A1B29] text-white px-8 py-3 rounded-full font-bold text-lg">Corporate & Investment Banking</p>
                           </div>
                        </div>
                      ` : page.content.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>').replace(/^(.+?)<br>/, '<h2 class="text-2xl font-black text-[#7A1B29] border-b-2 border-[#F2A900] pb-2 inline-block mb-4">$1</h2><br>').replace(/- (.*?)(<br>|$)/g, '<div class="flex items-start gap-2 mb-1"><div class="mt-3.5 w-2 h-2 rounded-full bg-[#F2A900] shrink-0"></div><span>$1</span></div>')}
                    </div>

                    <div class="absolute bottom-6 left-0 w-full flex justify-center z-10">
                        <span class="text-gray-500 font-bold text-sm border-t-2 border-[#F2A900] pt-1 px-4">${page.id}</span>
                    </div>
                </div>
            `).join('');

            setTimeout(() => { window.print(); }, 500);
        }

        // التهيئة الأولية
        document.addEventListener("DOMContentLoaded", () => {
            buildSidebar();
            renderPage();
            lucide.createIcons();
        });

    </script>
</body>
</html>
