        * { font-family: 'Tajawal', sans-serif; }
        
        body { background: linear-gradient(135deg, #f5f7fa 0%, #eef2f5 100%); }
        
        /* تأثيرات زجاجية */
        .glass-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
        }
        
        /* تنسيق الطباعة */
        @media print {
            body { background: white !important; margin: 0; padding: 0; }
            @page { size: A4; margin: 0; }
            .print-hidden, .no-print { display: none !important; }
            .print-page { 
                page-break-after: always; 
                page-break-inside: avoid;
                width: 210mm;
                min-height: 297mm;
                position: relative;
                box-sizing: border-box;
            }
        }
        
        /* سكرول بار مخصص */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #F2A900; border-radius: 10px; }
        
        /* أنيميشن للصفحات */
        .page-transition { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
        
        /* تنسيق الجداول الاحترافية */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .data-table th {
            background: linear-gradient(135deg, #7A1B29, #5e131f);
            color: white;
            padding: 14px;
            font-weight: bold;
        }
        .data-table td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .data-table tr:hover { background: #fef3c7; }
        
        /* بطاقات المؤشرات */
        .metric-card {
            background: linear-gradient(135deg, #ffffff, #f8fafc);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(242,169,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .metric-card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1); }
        
        /* شريط التقدم */
        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #F2A900, #e09e00);
            border-radius: 10px;
            transition: width 0.5s;
        }
        
        /* زر التعديل العائم */
        .floating-edit-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            background: linear-gradient(135deg, #7A1B29, #5e131f);
            border-radius: 60px;
            padding: 12px 28px;
            box-shadow: 0 10px 25px -5px rgba(122,27,41,0.4);

            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
            background: #10b981;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s;

        // تحميل البيانات
        function loadData() {
            const saved = localStorage.getItem('kib_report_2025_v3');
            if(saved) {
                pagesData = JSON.parse(saved);
            } else {
                pagesData = [...basePages];
                pagesData.sort((a,b) => (a.order || 0) - (b.order || 0));
            }
            updatePageCounter();
            renderPagesList();
            if(pagesData.length > 0) {
                currentPageId = pagesData[0].id;
                renderCurrentPage();
            }
            initSortable();
        }
        
        function saveData() {
            localStorage.setItem('kib_report_2025_v3', JSON.stringify(pagesData));
            // إظهار مؤشر الحفظ التلقائي
            const indicator = document.getElementById('auto-save-indicator');
            indicator.style.opacity = '1';
            setTimeout(() => { indicator.style.opacity = '0'; }, 2000);
        }
        
        function updatePageCounter() {
            document.getElementById('page-counter').innerText = pagesData.length;
        }
        
        function renderPagesList() {
            const container = document.getElementById('pages-list');
            container.innerHTML = pagesData.map(page => `
                <div data-id="${page.id}" class="sortable-item">
                    <div class="flex items-center justify-between p-2 rounded-lg cursor-move hover:bg-gray-800 transition ${currentPageId === page.id ? 'bg-[#F2A900] text-gray-900' : 'text-gray-200 hover:bg-gray-800'}">
                        <div class="flex items-center gap-2 flex-1" onclick="goToPage('${page.id}')">
                            <i data-lucide="grip-vertical" class="w-4 h-4 text-gray-400 cursor-grab"></i>
                            <span class="text-sm truncate">${page.title}</span>
                        </div>
                        <button onclick="event.stopPropagation(); deletePage('${page.id}')" class="text-red-400 hover:text-red-200 px-2">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }
        
        function initSortable() {
            if(sortableInstance) sortableInstance.destroy();
            const container = document.getElementById('pages-list');
            sortableInstance = new Sortable(container, {
                animation: 200,
                handle: '.cursor-grab',
                onEnd: function() {
                    const newOrder = [];
                    document.querySelectorAll('#pages-list .sortable-item').forEach(el => {
                        const id = el.getAttribute('data-id');
                        const page = pagesData.find(p => p.id === id);
                        if(page) newOrder.push(page);
                    });
                    pagesData = newOrder;
                    saveData();
                    renderPagesList();
                }
            });
        }
        
        function goToPage(pageId) {
            if(isEditMode) toggleEditMode();
            currentPageId = pageId;
            renderCurrentPage();
            renderPagesList();
        }
        
        function renderCurrentPage() {
            const page = pagesData.find(p => p.id === currentPageId);
            if(!page) return;
            const viewDiv = document.getElementById('view-mode');
            viewDiv.innerHTML = page.content;
            document.getElementById('page-number').innerText = `صفحة ${pagesData.findIndex(p=>p.id===currentPageId)+1} من ${pagesData.length}`;
            lucide.createIcons();
        }
        
        function toggleEditMode() {
            isEditMode = !isEditMode;
            const viewDiv = document.getElementById('view-mode');
            const editDiv = document.getElementById('edit-mode');
            const btn = document.getElementById('toggle-edit-btn');
            const modeSpan = document.getElementById('mode-indicator');
            
            if(isEditMode) {
                viewDiv.classList.add('hidden');
                editDiv.classList.remove('hidden');
                if(!quillEditor) {
                    quillEditor = new Quill('#quill-editor', {
                        theme: 'snow',
                        dir: 'rtl',
                        modules: {
                            toolbar: [
                                [{header:[1,2,3,4,5,6,false]}], ['bold','italic','underline','strike'],
                                [{list:'ordered'},{list:'bullet'}], ['link','clean']
                            ]
                        }
                    });
                    quillEditor.on('text-change', () => {
                        const page = pagesData.find(p => p.id === currentPageId);
                        if(page) {
                            page.content = quillEditor.root.innerHTML;
                            saveData();
                        }
                    });
                }
                const page = pagesData.find(p=>p.id===currentPageId);
                quillEditor.root.innerHTML = page.content;
                btn.innerHTML = '<i data-lucide="save" class="w-5 h-5"></i><span>حفظ وإنهاء التعديل</span>';
                modeSpan.innerText = 'تعديل';
            } else {
                const page = pagesData.find(p=>p.id===currentPageId);
                if(quillEditor) page.content = quillEditor.root.innerHTML;
                viewDiv.innerHTML = page.content;
                viewDiv.classList.remove('hidden');
                editDiv.classList.add('hidden');
                btn.innerHTML = '<i data-lucide="edit-3" class="w-5 h-5"></i><span>تعديل الصفحة</span>';
                modeSpan.innerText = 'قراءة';
                saveData();
                renderPagesList();
            }
            lucide.createIcons();
        }
        
        function addNewPage() {
            const newId = 'p' + Date.now();
            pagesData.push({ id: newId, title: `صفحة جديدة ${pagesData.length+1}`, content: '<h2>صفحة جديدة</h2><p>يمكنك تعديل هذا المحتوى باستخدام المحرر المتقدم.</p>' });
            saveData();
            updatePageCounter();
            renderPagesList();
            goToPage(newId);
            Swal.fire('تمت الإضافة', 'تم إضافة صفحة جديدة بنجاح', 'success');
        }
        
        function deletePage(pageId) {
            if(pagesData.length <= 1) {
                Swal.fire('تنبيه', 'لا يمكن حذف جميع الصفحات', 'warning');
                return;
            }
            Swal.fire({ title: 'تأكيد الحذف', text: 'هل أنت متأكد من حذف هذه الصفحة؟', icon: 'warning', showCancelButton: true, confirmButtonText: 'نعم، احذف' }).then(res => {
                if(res.isConfirmed) {
                    pagesData = pagesData.filter(p => p.id !== pageId);
                    saveData();
                    updatePageCounter();
                    if(currentPageId === pageId) goToPage(pagesData[0].id);
                    renderPagesList();
                    Swal.fire('تم الحذف', '', 'success');
                }
            });
        }

            previewWindow.document.write(`

                ${pagesData.map((p,idx) => `<div class="page-box"><h2 class="page-title">${p.title}</h2><div>${p.content}</div><div class="footer">صفحة ${idx+1} من ${pagesData.length}</div></div>`).join('')}
                </body></html>
            `);
            previewWindow.document.close();
        }
        
        function exportToPDF() {
            const printDiv = document.getElementById('print-container');
            printDiv.innerHTML = pagesData.map((p, idx) => `
                <div class="print-page" style="padding:25mm 20mm; box-sizing:border-box;">
                    <div style="position:absolute; top:0; left:0; width:100%; height:3px; background:#7A1B29;"></div>
                    <div style="position:absolute; top:0; left:0; width:33%; height:3px; background:#F2A900;"></div>
                    <div style="margin-bottom:30px; border-bottom:2px solid #F2A900; padding-bottom:10px; display:flex; justify-content:space-between;">
                        <span style="color:#7A1B29; font-weight:bold;">بنك الكريمي الإسلامي - التقرير السنوي 2025</span>
                        <span style="color:#F2A900;">${p.title}</span>
                    </div>
                    <div>${p.content}</div>
                    <div style="position:absolute; bottom:15px; left:0; width:100%; text-align:center; font-size:11px; color:#aaa;">${idx+1} / ${pagesData.length}</div>
                </div>
            `).join('');
            setTimeout(() => { window.print(); }, 200);
        }
        
        function exportFullReport() {
            const dataStr = JSON.stringify(pagesData, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `kib_report_2025_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            Swal.fire('تم التصدير', 'تم تصدير التقرير كملف JSON بنجاح', 'success');
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            lucide.createIcons();
        });
    </script>
</body>
</html>
