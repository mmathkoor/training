    <script>
        // --- بيانات التقرير السنوي 2024 (29 صفحة) ---
        const initialReportData = [
          { id: 1, title: "الغلاف", content: "التقرير السنوي\n\nANNUAL REPORT\n\n2024\n\nبنك الكريمي الإسلامي\nAlKuraimi Islamic Bank\nCorporate & Investment Banking" },
          { id: 2, title: "عن البنك", content: "عن بنك الكريمي الإسلامي\n\nنظراً لحاجة قطاع الأعمال والشركات للخدمات البنكية الشاملة تم تأسيس بنك الكريمي الإسلامي وفقا لقانون المصارف الإسلامية في الجمهورية اليمنية ليقدم خدمات بنكية متميزة، تطور وتلبي أعمال وتطلعات الشركات والمؤسسات والمنظمات الدولية والعاملين فيها وكذلك الشخصيات والأفراد بحسب سياسة البنك ولوائحه الداخلية وبما يتوافق مع أحكام الشريعة الإسلامية.\n\nالرؤية:\nبنك يمني قائد ذو بصمة مميزة في عالم الأعمال البنكية الإسلامية وبمعايير عالمية.\n\nالرسالة:\nالمساهمة في تنمية قطاع الأعمال اليمني من خلال تطوير وتقديم منتجات وخدمات بنكية مبتكرة وبمعايير عالمية تتوافق مع أحكام الشريعة الإسلامية تلبي احتياجات مختلف القطاعات الاقتصادية الاستراتيجية، باستخدام أحدث التقنيات لزيادة الكفاءة والفعالية عن طريق كادر بشري محترف لتحقيق قيمة مضافة للعملاء والمساهمين والاقتصاد الوطني.\n\nالغايات الاستراتيجية:\n- تقديم وتطوير خدمات ومنتجات بنكية متميزة ومبتكرة بمعايير عالمية تتوافق مع أحكام الشريعة الإسلامية تغطي مختلف القطاعات الاقتصادية الاستراتيجية في السوق اليمني وتلبي احتياجات العملاء المتغيرة وفق أفضل الممارسات المصرفية.\n- بناء علاقات متميزة ومباشرة مع شبكة واسعة من البنوك المراسلة الدولية والإقليمية بما يغطي احتياجات قطاع الأعمال وفقا لأفضل الممارسات البنكية الدولية.\n- بناء بنك قائد قادر على التأقلم مع المستجدات والمتغيرات، ذو هيكل تنظيمي فعال وقيادة مؤهلة قادرة على استقطاب الكفاءات والاستخدام الأمثل للموارد المالية والبشرية وتطوير السياسات والإجراءات وأنظمة الرقابة والحوكمة الرشيدة وتستخدم أحدث التقنيات والتجهيزات لزيادة الكفاءة والفاعلية.\n- هندسة استثمارات آمنة محلية ودولية لتوظيف الأموال المتاحة بما يتوافق مع أحكام الشريعة الإسلامية بما يحقق عائد مجزي للمودعين والمساهمين." },
          { id: 3, title: "منظومة القيم", content: "منظومة القيم\n\nالالتزام:\nملتزمون في بنك الكريمي الإسلامي برسالتنا وقيمنا وغاياتنا الاستراتيجية حرصا منا على كسب ثقة جميع الأطراف ذات العلاقة داخل وخارج البنك.\n\nالمسئولية الاجتماعية:\nنسعى في بنك الكريمي الإسلامي على ترك بصمات إيجابية في المجتمع إدراكا منا لمسؤوليتنا الاجتماعية تجاه البيئة التي نعمل فيها.\n\nالإحترام:\nنحترم في بنك الكريمي الإسلامي عملائنا الداخليين والخارجيين ونتطلع دائما لتحقيق تطلعاتهم بما يفوق توقعاتهم.\n\nالوضوح و الشفافية:\nنحرص في بنك الكريمي الإسلامي على تحقيق مبدأ الوضوح والشفافية في رؤيتنا واهدافنا وجميع أنشطتنا وفقا لمبادئ الحوكمة ومتطلبات الامتثال حرصا منا على ان نكون الشريك المالي الأكثر موثوقية وقدرة على الاستجابة لطلبات عملائنا داخليا وخارجيا.\n\nالمصالح المشتركة:\nنبني علاقاتنا على أساس تحقيق المصلحة المشتركة للعملاء والمودعين والمساهمين لخلق روابط متينة وقوية تؤسس لعلاقة استراتيجية مربحة للجميع من خلال ابتكار منتجات بنكية وهندسة استثمارات مالية تواكب احتياجات العملاء المتجددة والمتنوعة.\n\nالأمانة:\nنحرص في بنك الكريمي الإسلامي بتأدية واجباتنا وفقاً لأعلى معايير الأمانة والموثوقية والاستخدام الأمثل لموارد البنك البشرية والمالية بحس من المسؤولية والالتزام وفقا لمبادئ وضوابط الشريعة الاسلامية." },
          { id: 4, title: "نظام KIB IB", content: "أدر جميع حساباتك\nبسهولة مع نظام\n\nKIB IB\n\nبنك الكريمي الإسلامي\nالتقرير السنوي 2024" },
          { id: 5, title: "لماذا بنك الكريمي", content: "لماذا ؟\nبنك الكريمي الإسلامي .. هو اختيارك الأول؟\n\n- فريق عمل محترف مؤهل محلياً وخارجياً من أفضل مراكز التدريب المتخصصة عالمياً بما يلبي تطلعات العملاء عن مستوى جودة تقديم الخدمة وفقا لأفضل الممارسات البنكية العالمية.\n- نظام بنكي عالمي متكامل وحديث جداً ((TEMENOS)) يغطي جميع الخدمات المصرفية وفق أرقى المواصفات الدولية.\n- انتشار واسع عبر فروع البنك.\n- تقديم خدمات استشارية في الجوانب الفنية الدقيقة للقواعد والإجراءات المنظمة لعمل الخدمات التجارية والتجارة الدولية.\n- التزام كامل في تحقيق ضوابط الشريعة الإسلامية ومتطلبات الممارسات المصرفية المعتبرة عند تقديم الخدمة.\n- التزام كامل بالحفاظ على سرية بيانات العملاء.\n- السرعة والدقة في إنجاز المعاملات.\n- شبكة مراسلين تلبي طلبات الموردين في الخارج من حيث السرعة والجودة والتكلفة.\n- قدره على تغطية البنوك الخارجية في أوقات الاستحقاق دون تأخير وبما يحقق رضا العملاء وتعزيز ثقة الموردين بالعميل.\n- مرونة في سياسة تسعير الخدمات المصرفية بما يتوافق مع أفضل النسب المقدمة في السوق المحلية.\n- متابعة مستمرة لمسار تقديم الخدمة ابتداء من استلام الطلب وحتى اقفال ملف العملية بنجاح.\n- مركزية خدمة العميل في البنك والتقييم المستمر لمدى رضا عملائنا عن مستوى تقديم الخدمة.\n- هياكل تمويلية مرنة لتمويل الشركات تتناسب مع التدفق النقدي للشركات وطبيعة نشاطها والسلع المراد تمويلها." },
          { id: 6, title: "الاعتمادات المستندية", content: "الاعتمادات المستندية\n\nالحل الأمثل لضمان تعاملاتك التجارية" },
          { id: 7, title: "الحوالات", content: "حوالتك\nبين يديك\nفي لحظات" },
          { id: 8, title: "الودائع الإستثمارية", content: "الودائع الإستثمارية\n\nطريقك للنجاح المالي\n\n%" },
          { id: 9, title: "الفهرس", content: "الفهرس\n\nأعضاء مجلس الإدارة\nكلمة رئيس مجلس الإدارة\nإنجازات البنك 2024م\nتقرير هيئة الرقابة الشرعية\nتقرير مدقق الحسابات" },
          { id: 10, title: "أعضاء مجلس الإدارة", content: "أعضاء مجلس الإدارة\n\n- الحاج عبد الله عبده الكريمي (رئيس مجلس الإدارة)\n- أ. يوسف عبده محمد الكريمي (نائب رئيس مجلس الإدارة - العضو المنتدب)\n- أ. محمد عبده محمد الكريمي (عضو مجلس الإدارة)\n- أ. رضوان عبد الله عبده الكريمي (عضو مجلس الإدارة)\n- أ. محمد عبد الله عبده الكريمي (عضو مجلس الإدارة)" },
          { id: 11, title: "شريك مسيرتك", content: "شريك في مسيرتك\nشريك لتحقيق أهدافك\n\nKIB" },
          { id: 12, title: "كلمة رئيس مجلس الإدارة 1", content: "كلمة رئيس مجلس الإدارة\n\nالإخوة أعضاء الجمعية العمومية\nضيوفنا الكرام\nالمحترمون\n\nبسم الله الرحمن الرحيم\nالسلام عليكم ورحمة الله وبركاته، وبعد:\n\nيسرني أن أرحب بكم في اجتماعنا السنوي، وأضع بين أيديكم التقرير السنوي لبنك الكريمي الإسلامي عن العام 2024م، الذي يجسد أداء متميزا، رغم التحديات الداخلية والخارجية، إلا أن البنك واصل إسهامه في دعم النشاط الاقتصادي وتأمين الاحتياجات الأساسية، مؤكدًا التزامنا الثابت برسالتنا ودورنا الوطني.\n\nنظرة على المشهد الاقتصادي\n\nشهد الاقتصاد العالمي خلال عام 2024 تباطؤا واضحًا في وتيرة النمو مع استمرار الضغوط التضخمية، في ظل بيئة جيوسياسية غير مستقرة وسياسات نقدية صارمة استهدفت احتواء التضخم. كما أثرت القيود التجارية والاضطرابات البحرية على تكاليف النقل والإمداد، وزادت من أعباء التجارة الدولية. ورغم ظهور مؤشرات إيجابية في بعض الاقتصادات الآسيوية واستمرار الدفع بالاستثمارات المرتبطة بالتحول الرقمي والاقتصاد الأخضر ظل المشهد العام معرضا لمخاطر مستمرة.\n\nوعلى المستوى المحلي\n\nواجه الاقتصاد اليمني خلال عام 2024 تحديات كبيرة، شملت الضغوط التضخمية وارتفاع أسعار السلع الأساسية وضعف الإيرادات العامة، مع استمرار الصراع الذي انعكس على النشاط الاقتصادي وقيمة العملة الوطنية، كما أضافت التوترات في البحر الأحمر طبقة إضافية من التعقيد، مما أثر على سلاسل التوريد وكلفة الاستيراد.\n\nورغم هذه الظروف، واصل القطاع المصرفي أداء دوره المحوري في تمويل الأنشطة الاقتصادية ودعم استقرار الأسواق المحلية، بما يضمن توفير الاحتياجات الأساسية للمواطنين واستمرارية النشاط الاقتصادي، وفي هذه المرحلة الدقيقة، تتجلى الحاجة الماسة إلى تبني استراتيجيات فعّالة ومرنة تمكن القطاع المصرفي من مواجهة التحديات الراهنة، والمساهمة بجميع الإمكانيات في ضمان استمرارية تقديم الخدمات المصرفية والتمويلية لكافة القطاعات الاقتصادية والصناعية والتجارية والخدمية." },
          { id: 13, title: "كلمة رئيس مجلس الإدارة 2", content: "إنجازاتنا في ظل التحديات\n\nوسط جملة من التحديات المحلية والعالمية المستمرة منذ أعوام، إلى جانب المخاطر الالكترونية والبيئية والقلق المرتبط بسلاسل التوريد وحركة التجارة الدولية، ورغم كل هذه التداعيات، تمكن بنك الكريمي الإسلامي من المضي قدما في تنفيذ خطته الاستراتيجية، محققا إنجازات نوعية متميزة على المستويين المالي والتشغيلي. فقد استطاع البنك تعزيز مركزه المالي وإطلاق تحسينات أساسية في عملياته الداخلية، إضافة إلى ابرام شراكات فاعلة مع عدد من المؤسسات المحلية والدولية.\n\nوفي إطار دعمه المستمر للاقتصاد الوطني، وسع البنك نطاق تمويلاته الائتمانية الموجهة إلى المؤسسات والشركات لتغطية الاحتياجات الأساسية والمواد الحيوية للمواطنين، مما ساهم في الحد من الضغوط الاقتصادية. كما انعكس نهجه الاستراتيجي في تحقيق مجموعة من الأهداف الجوهرية، أبرزها تنمية قاعدة العملاء، وزيادة مستويات الإقبال على منتجاته وخدماته وتسريع إنجاز المعاملات للعملاء." },
          { id: 14, title: "الأداء المالي 1", content: "الأداء المالي\n\nخلال عام 2024، واصل بنك الكريمي الإسلامي تحقيق نتائج مالية قوية تعكس متانة استراتيجيته وكفاءة إدارته. فقد سجل صافي الدخل الشامل ارتفاعاً ملحوظاً بنسبة 30.5% من 1.56 مليار ريال يمني في عام 2023م إلى 2.03 مليار ريال يمني عام 2024، الأمر الذي عزز موقعه الريادي ضمن القطاع المصرفي الإسلامي.\n\nكما ارتفع إجمالي الأصول ليصل إلى 144.06 مليار ريال يمني بنهاية العام، مقابل 90.10 مليار ريال في العام السابق، محققاً نمواً يقارب 60%. كذلك، نمت محفظة التمويلات والاستثمارات بنسبة 76% حيث بلغت 20.41 مليار ريال يمني مقارنة بـ 11.60 مليار ريال يمني في عام 2023م، مع مواصلة التركيز على إدارة هذه الموارد بكفاءة عالية.\n\n(مؤشرات مالية بالمليار ريال يمني):\n- صافي الدخل الشامل: (2022: 1.18) | (2023: 1.56) | (2024: 2.03)\n- إجمالي الأصول: (2022: 69.04) | (2023: 90.10) | (2024: 144.06)\n- صافي محفظة التمويلات: (2022: 9.01) | (2023: 11.60) | (2024: 20.41)\n- إجمالي حقوق المساهمين: (2022: 13.11) | (2023: 14.67) | (2024: 16.70)" },
          { id: 15, title: "الأداء المالي 2", content: "ودائع العملاء وتوزيع الأرباح\n\nورغم التحديات المحيطة بالقطاع المالى، تمكن البنك من تعزيز ثقة عملائه واستقطاب شرائح جديدة، حيث وصلت ودائع العملاء في نهاية 2024م إلى 83.75 مليار ريال يمني مقارنة بـ 52.01 مليار ريال يمني بنهاية عام 2023م، بنسبة نمو بلغت 61%.\n\nكما واصل البنك التزامه بحماية أموال المودعين وتقديم عوائد مجزية، حيث وزع أرباحًا تنافسية عام 2024م بلغت 11.52% على العملة المحلية و 6.55% على العملات الأجنبية، مما أسهم في ترسيخ سمعة البنك، مؤكداً مكانته كأحد أبرز البنوك الإسلامية في السوق المحلي.\n\nإجمالي ودائع العملاء (بالمليار):\n- 2022: 37.67\n- 2023: 52.01\n- 2024: 83.75\n\nنسب توزيع الأرباح (العملة المحلية):\n- 2022: 13.12%\n- 2023: 11.08%\n- 2024: 11.52%\n\nنسب توزيع الأرباح (العملة الأجنبية):\n- 2022: 5.01%\n- 2023: 6.57%\n- 2024: 6.55%" },
          { id: 16, title: "خدمات الشركات", content: "خدمات الشركات\n\n- تمويل الشركات\n- الخدمات التجارية\n- نظام KIB IB\n- الحوالات\n- Swift التجارية\n- الحساب الجاري للشركات" },
          { id: 17, title: "دعم قطاع الأعمال", content: "دعم قطاع الأعمال\n\nيحرص بنك الكريمي الاسلامي على تقديم اهتمام خاص بقطاع الأعمال من خلال نهج مسؤول يركز على تقديم خدمات مصرفية متكاملة تلبي احتياجات الشركات بمختلف أحجامها وأنشطتها، ويشمل ذلك توفير حلول تمويلية متنوعة، وتقديم استشارات مالية متخصصة، إلى جانب تطوير منتجات وخدمات مبتكرة تعزز كفاءة الشركات وتساعدها على تحقيق أهدافها.\n\nوقد نجح البنك في ترسيخ مستوى عال من رضا عملائه من قطاع الشركات، وبناء شراكات استراتيجية مستدامة مع الموردين بما يسهم في دعم الاقتصاد الوطني وتوفير المواد الأساسية التي تلبي احتياجات المواطنين.\n\nخلال عام 2024م، قدم البنك تمويلات لقطاع الأعمال بلغت نحو 85.39 مليار ريال يمني مقارنة بالعام 2023م مبلغ 39.36 مليار ريال يمني، كما نفذ عمليات تجارية خارجية بقيمة 626 مليون دولار أمريكي في العام 2024م مقارنة بالعام 2023م مبلغ 425.3 مليون دولار أمريكي، مع الالتزام بترشيد التكاليف التشغيلية والحفاظ على جودة المنتجات والخدمات.\n\nالتمويلات (بالمليار ريال):\n- 2022: 35.82\n- 2023: 39.36\n- 2024: 85.39\n\nالعمليات التجارية (بالمليون دولار):\n- 2022: 425.3\n- 2023: 553\n- 2024: 626\n\nويعكس ذلك التزام البنك الراسخ بمواصلة دوره التنموي والاقتصادي، رغم التحديات الكبيرة التي فرضتها الظروف المحيطة." },
          { id: 18, title: "الكوادر البشرية", content: "الاستثمار في كوادرنا البشرية\n\nيولي بنك الكريمي الإسلامي أهمية قصوى لتنمية موارده البشرية باعتبارها الركيزة الأساسية لتحقيق استراتيجيته، وانطلاقا من هذا التوجه، حرص البنك على استقطاب الكفاءات المتميزة، وتوظيفها وتحفيزها، مع التركيز على استدامة المواهب وتطويرها بما يسهم في رفع الإنتاجية وخفض التكاليف.\n\nكما عمل البنك على ترسيخ بيئة عمل جاذبة وتنافسية، توفر للموظفين فرصا واسعة للتطوير، ومزايا وحوافز قائمة على الأداء، إضافة إلى مسارات وظيفية عادلة مبنية على الجدارة، وفي هذا الإطار، تم تعيين 49 موظفا جديدًا لتلبية احتياجات الإدارات والفروع.\n\nوفي جانب التدريب والتأهيل، استثمر البنك في تطوير قدرات موظفيه من خلال تنفيذ 88 برنامجا تدريبيا متنوعًا وفق أفضل الممارسات الدولية، كما حرص على تأهيل كوادره للحصول على الشهادات المهنية الدولية المعتمدة في مختلف التخصصات المصرفية، بما في ذلك شهادات مكافحة غسل الأموال وتمويل الإرهاب، إضافة إلى الدبلومات المهنية المصرفية. ويأتي ذلك في إطار التزام البنك بتعزيز كفاءة كوادره البشرية وتأهيلهم لمواكبة متطلبات العمل المصرفي الحديث، والارتقاء بمستوى الخدمات المقدمة للعملاء، بما يعزز من قدرة البنك التنافسية ويرسخ مكانته الرائدة في السوق المصرفي." },
          { id: 19, title: "إدارة المخاطر", content: "إدارة المخاطر المؤسسية\n\nفي مجال إدارة المخاطر، يواصل بنك الكريمي الإسلامي ترسيخ مكانته من خلال تبني منظومة متكاملة ومتخصصة تستند إلى نهج شامل يقوم على تحديد المخاطر المحتملة وتقييمها ومعالجتها بفعالية ويحرص البنك على تطبيق سياسات وإجراءات رقابية تهدف إلى التحكم في هذه المخاطر والحد من تأثيرها على أعماله وأهدافه الاستراتيجية، كما يعمل باستمرار على مواءمة أنظمة إدارة المخاطر مع أفضل الممارسات والمعايير الدولية، بما يسهم في تحقيق نمو مستدام ويحافظ على متانة مركزه المالي.\n\nويولي البنك أهمية خاصة لتعزيز قدراته في رصد وتقييم المخاطر عبر إعداد تقارير دورية ومراجعة مستمرة لمناهج وأساليب إدارة المخاطر، فضلا عن تحديث السياسات والأطر الاستراتيجية بشكل منتظم. ويهدف ذلك إلى ضمان كفاءة وفعالية الإجراءات المطبقة، وتحقيق التوازن بين الحد من المخاطر وتعظيم العوائد من مختلف أنشطة البنك.\n\nوفي ظل البيئة التشغيلية المعقدة والتحديات الاقتصادية الراهنة عزز البنك من أطر إدارة المخاطر التشغيلية والائتمانية والسوقية، مع إيلاء اهتمام خاص للمخاطر الناشئة مثل المخاطر السيبرانية، بما يضمن استمرارية الأعمال وحماية مصالح جميع أصحاب المصلحة." },
          { id: 20, title: "الالتزام والحوكمة", content: "الالتزام والحوكمة\nCommitment & governance\n\nيضع بنك الكريمي الإسلامي الالتزام في مقدمة أولوياته الاستراتيجية، باعتباره ركيزة أساسية في عمل مجلس الإدارة والإدارة التنفيذية. ويحرص البنك على الامتثال لجميع القوانين واللوائح النافذة، وفي مقدمتها تعليمات البنك المركزي اليمني، ويلتزم بتطبيق السياسات والاجراءات المرتبطة بمكافحة غسل الأموال وتمويل الإرهاب ومكافحة الاحتيال وفق أفضل الممارسات الدولية، ومن هذا المنطلق، يعمل البنك بمنهجية قائمة على المخاطر لمراقبة كفاءة الضوابط والأنظمة وتقييم فعاليتها بصورة منتظمة.\n\nكما يواصل البنك تعزيز قدراته في مجال الالتزام من خلال تحديث السياسات والإجراءات والأنظمة الداخلية بشكل مستمر، وتكثيف برامج تدريب الموظفين، لضمان التوافق مع المعايير المحلية والدولية. ويأتي ذلك في إطار حرص البنك على ترسيخ سمعته المؤسسية، وحماية مصالح عملائه، وتعزيز علاقاته مع البنوك والمؤسسات المالية محليا ودوليا.\n\nوتعد المراجعة الداخلية جزءا محوريا من نظام الحوكمة في بنك الكريمي الإسلامي، إذ تضطلع بدور أساسي في تقييم فعالية أنظمة الرقابة الداخلية، وإدارة المخاطر، وعمليات الامتثال، كما تسهم في التأكد من أن الأنشطة الإدارية والتشغيلية تنفذ وفقًا للسياسات والإجراءات المعتمدة وأفضل الممارسات المهنية والقانونية، إلى جانب تقديم المشورة للإدارة العليا ومجلس الإدارة بشأن تحسين الأداء وتعزيز كفاءة وفعالية آليات العمل في جميع إدارات وفروع البنك." },
          { id: 21, title: "البنوك المراسلة", content: "البنوك المراسلة والشراكات الدولية\n\nوفي مجال العلاقات الخارجية، عزز بنك الكريمي الإسلامي شبكة تعامله مع البنوك المراسلة الإقليمية والدولية، بما يضمن استمرار تقديم خدمات متكاملة تلبي احتياجات قطاع الأعمال وفق أفضل المعايير المصرفية الدولية. كما يحرص البنك على تطوير علاقاته مع المؤسسات المالية الدولية والمنظمات التنموية، بما ينسجم مع أهدافه الاستراتيجية في التحول الرقمي وتعزيز مكانته في السوق المصرفي.\n\nوقد مكنته هذه الشبكة الواسعة من الحفاظ على مستوى عال من الخدمات المصرفية الدولية، رغم التحديات الاقتصادية والجيوسياسية المحيطة، مما عزز ثقة العملاء والشركاء التجاريين في قدرة البنك على تلبية احتياجاتهم المصرفية المتنوعة بكفاءة واحترافية عالية. كما ساهمت هذه الشراكات الاستراتيجية في تعزيز قدرة البنك على تسهيل التجارة الخارجية وتقديم خدمات الحوالات المالية العالمية، خاصة من خلال شراكته المتميزة مع «ويسترن يونيون»، التي تربطه بأكثر من 200 دولة حول العالم." },
          { id: 22, title: "التحول الرقمي", content: "التحول الرقمي والابتكار\n\nتعد تقنية المعلومات ركيزة أساسية في دعم عمليات البنك وتحقيق رسالته وأهدافه الاستراتيجية. حيث يتبنى البنك نهجا يقوم على توظيف أحدث الحلول الرقمية لتعزيز الكفاءة والابتكار، وانطلاقا من إيمانه بأهمية هذا المجال، يستثمر البنك بشكل مستمر في تطوير بنيته التحتية التكنولوجية، مع التركيز على توفير أنظمة متقدمة وموثوقة تدعم استدامة أعماله.\n\nوخلال العام، أنجز البنك خطوات بارزة شملت التحديث الشامل للبنية التحتية والشبكات في جميع الفروع، إضافة إلى تطوير الأنظمة التقنية لتعزيز مستويات الأمان، وتحسين الأداء، وتقديم خدمات مالية عصرية. كما عمل على إعداد وتحديث الأدلة والإجراءات التشغيلية المرتبطة بالأنظمة التقنية، بما يضمن كفاءة التشغيل ويعزز قدرات الأمن السيبراني.\n\nوإدراكا لأهمية العنصر البشري في هذا المجال، أولى البنك جانب التوعية بأمن المعلومات اهتماما خاصا، عبر برامج تهدف إلى رفع وعي الموظفين بالمخاطر المحتملة، وتزويدهم بالممارسات الآمنة لحماية البيانات والمعلومات الحساسة." },
          { id: 23, title: "نظرة مستقبلية", content: "نظرة مستقبلية\n\nمع اختتام عام 2024، نتطلع في عام 2025 بكل ثقة وتفاؤل لمواصلة مسيرة الإنجاز والتطوير، وإطلاق العنان للابتكار، وتقديم الحلول والخدمات الجديدة والرائدة كما نسعى إلى مواصلة تطبيق استراتيجيتنا المصرفية المتكاملة، التي تمثل قاعدة الانطلاق للعبور للمستقبل بقوة وثبات، ومواكبة المتغيرات ومواجهة التحديات، وتحقيق المزيد من النجاحات على المدى الطويل بمشيئة الله، مؤكدين ريادتنا في عالم الخدمات المصرفية.\n\nكما سنعمل على الاستثمار الأمثل لإمكانياتنا وخبراتنا وإبداعات كوادرنا لمواجهة كافة التحديات المستقبلية التي تواجه القطاع المصرفي في البلاد، والمساهمة بشكل فعال نحو مستقبل مستدام وناجح.\n\nوبعد هذا العرض المختصر لإنجازات بنك الكريمي الإسلامي للعام 2024م، وبعد الاستماع إلى تقرير هيئة الرقابة الشرعية وتقرير مراقب حسابات البنك عن الحسابات الختامية والميزانية العمومية للسنة المنتهية 2024م، يوصي مجلس الإدارة الجمعية العمومية بما يلي:\n\n1. المصادقة على تقرير مجلس الإدارة عن السنة المنتهية في 31 ديسمبر 2024م.\n2. الإستماع إلى تقرير هيئة الرقابة الشرعية.\n3. الإستماع إلى تقرير مراقب الحسابات عن البيانات المالية للعام 2024م.\n4. إبراء ذمة رئيس وأعضاء مجلس الإدارة ومراقب الحسابات عن كل ما يتعلق بأعمالهم عن الفترة المنتهية في 31 ديسمبر 2024م.\n5. تعيين مراقب حسابات للعام 2025م وتحديد أتعابه أو تفويض مجلس الإدارة بذلك.\n6. المصادقة على تعديل النظام الأساسي للبنك.\n7. المصادقة على مقترح توزيع الأرباح.\n\nوفي الختام، نتقدم بخالص الشكر لعملائنا ومساهمينا على ثقتهم المستمرة ودعمهم الذي يمثل الركيزة الأساسية لنجاحنا كما نخص بالشكر فريق العمل في البنك على جهودهم وإخلاصهم في نمو واستدامة هذا الصرح المالي.\n\nوالسلام عليكم ورحمة الله وبركاته.\n\nعبد الله عبده الكريمي\nرئيس مجلس الإدارة" },
          { id: 24, title: "غلاف الرقابة الشرعية", content: "تقرير\nهيئة الرقابة\nالشرعية\n\n2024" },
          { id: 25, title: "تقرير الرقابة الشرعية", content: "التقرير السنوي الخامس لهيئة الرقابة الشرعية في بنك الكريمي الإسلامي للعام 2024م\n\nإلى مساهمي بنك الكريمي الإسلامي،،،، السلام عليكم ورحمة الله وبركاته\nالحمد لله رب العالمين والصلاة والسلام على سيدنا محمد وعلى آله وصحبه أجمعين، أما بعد:\n\nبناء على عقد الارتباط بين هيئة الرقابة الشرعية وبنك الكريمي الإسلامي، فقد راجعنا واعتمدنا السياسات والاتفاقيات والمنتجات والخدمات التي زاولها بنك الكريمي الإسلامي خلال عام 2024م كما قمنا بالمراجعة الواجبة لإبداء الرأي في مدى التزام البنك بمبادئ وأحكام الشريعة الإسلامية من خلال الفتاوى والقرارات والتوجيهات والارشادات التي اصدرناها. علما بأن مسئولية التأكد من أن البنك يعمل وفقا لأحكام الشريعة الإسلامية تقع على الإدارة أما مسئوليتنا فتنحصر في إبداء رأي مستقل بناء على مراقبتنا ومراجعتنا لعمليات البنك وفي إعداد تقرير لكم.\n\nوفي سبيل ذلك عقدت الهيئة عدة اجتماعات تمت فيها مراجعة واعتماد توزيع الأرباح ومناقشة التعديلات على عقود التمويل والاستثمار واستفسارات الإدارات من الهيئة بعد الحصول على المعلومات التي رأت الهيئة ضرورتها لإصدار رأيها، وتم من خلال المراقب الشرعي إجراء المراجعة والتدقيق الشرعي على العقود والاتفاقيات والسياسات وفقا لقرارات الهيئة كما تم الحصول على جميع المعلومات والتوضيحات التي اعتبرناها ضرورية لتزويدنا بأدلة تكفي لإعطاء تأكيد معقول ومقبول بأن بنك الكريمي الإسلامي لم يخالف أحكام وقواعد الشريعة الإسلامية في جميع المعاملات التي عرضت علينا، ومن خلال الاجراءات والخطوات التي اتبعناها للتأكد من التزام بنك الكريمي الإسلامي بأحكام الشريعة الإسلامية توصلت الهيئة الى ما يلي:\n\nأولاً: أن العقود والعمليات والمعاملات التي أبرمها بنك الكريمي الإسلامي خلال السنة المنتهية في 31 ديسمبر 2024 م والتي أطلعنا عليها، تمت في مجملها وفقا لأحكام ومبادئ الشريعة الإسلامية وقرارات وتوصيات هيئة الرقابة الشرعية.\n\nثانيا: أن توزيع الأرباح وتحميل الخسائر على حسابات الاستثمار يتفق مع الأساس الذي تم اعتماده من قبلنا وفقا لأحكام ومبادئ الشريعة الإسلامية.\n\nثالثا: أن احتساب الزكاة تم وفقا للمعايير الشرعية الصادرة عن هيئة المحاسبة والمراجعة للمؤسسات المالية الإسلامية.\n\nوننتهز هذه الفرصة لنعبر عن شكرنا وتقديرنا لإدارة البنك على تعاونها وتجاوبها مع الهيئة، ولكل المساهمين والمتعاملين مع البنك، سائلين الله تبارك وتعالى أن يبارك في جهودهم جميعا لخدمة الاقتصاد الإسلامي وتنمية وطننا بما يحقق الخير للجميع.\n\nوالسلام عليكم ورحمة الله وبركاته\n\n- محمد أحمد البكيلي (المراقب الشرعي)\n- أ. أحمد الجواني (عضو الهيئة)\n- د. محمد سعد نجاد (عضو الهيئة)\n- د. سعد عبد الله الأقرع (رئيس الهيئة)" },
          { id: 26, title: "غلاف مدقق الحسابات", content: "تقرير\nمدقق\nالحسابات\n\n2024" },
          { id: 27, title: "تقرير مدقق الحسابات 1", content: "تقرير مدقق الحسابات المستقل\n\nإلى السادة المساهمين\nبنك الكريمي الإسلامي\n(شركة مساهمة يمنية مقفلة)\nالجمهورية اليمنية\nالمحترمون\n\nالرأي:\nلقد قمنا بتدقيق البيانات المالية المرفقة لبنك الكريمي الإسلامي (ش.م. ي.م)، والتي تتكون من بيان المركز المالي كما في ٣١ ديسمبر ٢٠٢٤م وكلاً من بيان الربح أو الخسارة والدخل الشامل الآخر وبيان التدفقات النقدية وبيان التغير في حقوق المساهمين للسنة المنتهية في ٣١ ديسمبر ۲۰۲٤م، والإيضاحات المرفقة بالبيانات المالية (١-٤٤) التي تشتمل على ملخص بأهم السياسات المحاسبية الهامة والمعلومات التفسيرية الأخرى.\n\nبرأينا أن البيانات المالية المرفقة تظهر بصورة عادلة من جميع الجوانب الجوهرية، المركز المالي للبنك كما في ٣١ ديسمبر ۲۰۲٤م وأدائه المالي وتدفقاته النقدية للسنة المنتهية بذلك التاريخ وذلك وفقاً لمعايير المحاسبة المالية الصادرة عن هيئة المحاسبة والمراجعة للمؤسسات المالية الإسلامية (AAOIFI) ووفقاً لأحكام مبادئ الشريعة الإسلامية وحسب متطلبات القوانين والتشريعات اليمنية والتعليمات الصادرة عن البنك المركزي اليمني.\n\nأساس الرأي:\nلقد قمنا بعملية التدقيق وفقاً للمعايير الدولية للتدقيق. إن مسؤوليتنا وفقاً لهذه المعايير موضحة في الجزء الخاص بمسؤوليات مدقق الحسابات عن تدقيق البيانات المالية من هذا التقرير. وتتطلب هذه المعايير أن نقوم بتخطيط وتنفيذ عملية التدقيق من أجل الحصول على تأكيدات معقولة بأن البيانات المالية لا تحتوي على أخطاء جوهرية. إننا مستقلون عن البنك وفقا لقواعد السلوك الأخلاقي للمحاسبين المهنيين الصادرة عن مجلس المعايير الأخلاقية الدولية للمحاسبين (قواعد السلوك الأخلاقي) والمتطلبات الأخلاقية ذات الصلة بأعمال التدقيق التي نقوم بها على البيانات المالية للبنك في الجمهورية اليمنية. وقد التزمنا بمسؤوليتنا الأخلاقية الأخرى وفقاً لهذه المتطلبات. نعتقد أن أدلة التدقيق التي حصلنا عليها تعد كافية وملائمة لتكون أساسا معقولاً لرأينا.\n\nفقرات تأكيدية:\n1. بالإشارة إلى الايضاح رقم (٦-٩) من البيانات المالية بشأن مخاطر تقلبات العملة الأجنبية وأثرها على مراكز العملات الهامة، حيث التزم البنك بسعر الاقفال وفقا لتعليمات البنك المركزي اليمني للبنوك العاملة في الجمهورية اليمنية خلال السنة، وكذلك لتقييم مراكز العملات الأجنبية بتاريخ ٣١ ديسمبر ٢٠٢٤م، إن رأينا غير متحفظ بهذا الخصوص.\n2. الايضاح رقم (٤٣) من الإيضاحات المتممة للبيانات المالية، والذي يشير الى تأثير استمرار الازمة الأمنية والسياسية والاقتصادية في اليمن، والتي لا يمكن التنبؤ بنهايتها. أن هذه الأحداث يمكن أن تؤثر سلبا على الاقتصاد اليمني، وعلى عمليات البنك." },
          { id: 28, title: "تقرير مدقق الحسابات 2", content: "مسؤوليات الإدارة حول إعداد البيانات المالية للبنك:\nإن الإدارة مسؤولة عن إعداد هذه البيانات المالية وعرضها بصورة عادلة وفقاً لمعايير المحاسبة المالية الصادرة عن هيئة المحاسبة والمراجعة للمؤسسات المالية الإسلامية ووفقا لتعليمات البنك المركزي اليمني، والاحتفاظ بأنظمة الرقابة الداخلية التي تعتبرها الإدارة ضرورية لغرض إعداد البيانات المالية بصورة عادلة خالية من أخطاء جوهرية، سواء كانت ناشئة عن احتيال أو خطأ. إن الإدارة مسؤولة عند إعداد البيانات المالية عن تقييم قدرة البنك على الاستمرار كمنشأة مستمرة والافصاح عند الاقتضاء، عن المسائل المتعلقة بالاستمرارية واستخدام أساس المحاسبة وفقاً لمبدأ الاستمرارية. وتعتبر الإدارة مسؤولة عن الاشراف على عملية إعداد التقارير المالية للبنك.\n\nمسؤوليات مدقق الحسابات عن تدقيق البيانات المالية:\nإن غايتنا تتمثل في الحصول على تأكيد معقول فيما إذا كانت البيانات المالية خالية بصورة عامة من أخطاء جوهرية، سواء كانت ناشئة عن احتيال أو عن خطأ، وإصدار تقرير مدقق الحسابات الذي يشمل رأينا. ان التأكيد المعقول هو مستوى عالي من التأكيد، ولا يضمن أن عملية التدقيق التي تمت وفقاً للمعايير الدولية للتدقيق سوف تكشف دائما أي خطأ جوهري في حال وجوده. وقد تنشأ الأخطاء عن الاحتيال أو عن الخطأ، وتعتبر جوهرية بشكل فردي أو تجمع فيما إذا كان من المتوقع تأثيرها على القرارات الاقتصادية التي يتخذها المستخدمون على أساس هذه البيانات المالية.\n\nتقرير حول متطلبات قانونية وتنظيمية أخرى:\nبالإضافة إلى ذلك؛ برأينا أن البنك يحتفظ بسجلات محاسبية منتظمة. قد حصلنا على كافة المعلومات والافصاحات التي رأيناها ضرورية لأغراض تدقيقنا. كما نؤكد أن المعلومات المالية الواردة في تقرير مجلس الإدارة الموجه إلى الجمعية العمومية تتفق مع دفاتر وسجلات البنك. وفي حدود المعلومات التي توافرت لدينا لم تقع خلال السنة الحالية مخالفات لمواد وأحكام القوانين السارية في الجمهورية اليمنية بما في ذلك قانون الشركات التجارية رقم (۲۲) لسنة ۱۹۹۷م وتعديلاته وقانون البنوك رقم (۳۸) لسنة ۱۹۹۸م، وقانون المصارف الإسلامية رقم (۲۱) لسنة ۱۹۹٦م والمعدل بالقانون رقم (١٦) لسنة ۲۰۰۹م أو لأحكام النظام الأساسي للبنك على وجه قد يؤثر بشكل جوهري في المركز المالي.\n\nحمدي جوير - الشريك التنفيذي\nشركة ماندو للتدقيق والاستشارات\nعضو إنترناشيونال أكاونتنج جروب\nالجمهورية اليمنية، ٢٤ مايو ٢٠٢٥م" },
          { id: 29, title: "الغلاف الخلفي (الفروع)", content: "فروع بنك الكريمي الإسلامي:\n\n- عدن: شارع الملكة أروى (02/256144)\n- صنعاء: شارع عمان (01/537779)\n- صنعاء: شعوب (01/564273)\n- صنعاء: شارع تعز (01/600603)\n- ذمار: شارع صنعاء (06/428015)\n- الحديدة: شارع الميناء (03/245361)\n- إب: شارع الدائري (04/459003)\n- تعز: شارع جمال (04/260272)\n- تعز: الحوبان (04/291556)\n- مأرب: شارع عدن (06/302188)\n- المكلا: حي الشرج (05/352853)\n\nالإدارة العامة: عدن\ninfo@kibanks.com\nwww.kibanks.com" }
        ];

        // الحالة (State)
        let pages = JSON.parse(JSON.stringify(initialReportData));
        let currentIndex = 0;
        let isEditing = false;

        // عناصر واجهة المستخدم
        const pageTitle = document.getElementById('page-title');
        const pageCounter = document.getElementById('page-counter');
        const viewContainer = document.getElementById('view-container');
        const editContainer = document.getElementById('edit-container');
        const editor = document.getElementById('editor');
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const btnEdit = document.getElementById('btn-edit');
        const editIconContainer = document.getElementById('edit-icon-container');
        const editText = document.getElementById('edit-text');

        // تحديث واجهة المستخدم
        function render() {
            const page = pages[currentIndex];
            pageTitle.innerText = page.title;
            pageCounter.innerText = `صفحة ${page.id} من ${pages.length}`;

            if (isEditing) {
                viewContainer.classList.add('hidden');
                editContainer.classList.remove('hidden');
                
                if (editor.value !== page.content) {
                    editor.value = page.content;
                }
                
                // تحديث زر التعديل ليكون "حفظ"
                btnEdit.className = "flex items-center gap-2 px-4 py-2 rounded-md transition-colors bg-green-600 hover:bg-green-700 text-white shadow-sm";
                editIconContainer.innerHTML = '<i data-lucide="save" class="w-[18px] h-[18px]"></i>';
                editText.innerText = 'حفظ التعديلات';
            } else {
                viewContainer.classList.remove('hidden');
                editContainer.classList.add('hidden');
                
                // تحديث زر التعديل ليكون "تعديل"
                btnEdit.className = "flex items-center gap-2 px-4 py-2 rounded-md transition-colors bg-gray-200 hover:bg-gray-300 text-gray-800 shadow-sm";
                editIconContainer.innerHTML = '<i data-lucide="edit-3" class="w-[18px] h-[18px]"></i>';
                editText.innerText = 'تعديل الصفحة';

                // عرض المحتوى
                if (page.id === 1) {
                    viewContainer.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full text-center space-y-12">
                           <img src="Asset 1.png" alt="KIB Logo" class="h-24 mb-4" onerror="this.style.display='none'" />
                           <h1 class="text-5xl font-bold text-[#7A1B29]">التقرير السنوي</h1>
                           <h2 class="text-4xl text-gray-500 font-light tracking-widest uppercase">Annual Report</h2>
                           <div class="w-32 h-1 bg-[#F2A900] mx-auto"></div>
                           <h3 class="text-6xl font-black text-gray-800">2024</h3>
                           <div class="mt-16 text-[#7A1B29]">
                              <h4 class="text-3xl font-bold mb-2">بنك الكريمي الإسلامي</h4>
                              <p class="text-xl text-gray-600">AlKuraimi Islamic Bank</p>
                              <p class="text-md font-bold mt-4 text-[#F2A900]">Corporate & Investment Banking</p>
                           </div>
                        </div>
                    `;
                } else {
                    viewContainer.innerHTML = page.content.replace(/\n/g, '<br/>');
                }
            }

            btnNext.disabled = currentIndex === pages.length - 1;
            btnPrev.disabled = currentIndex === 0;

            // تحديث الأيقونات في كل مرة نعيد فيها رسم العناصر
            lucide.createIcons();
        }

        // الانتقال للصفحة التالية
        function nextPage() {
            if (currentIndex < pages.length - 1) {
                currentIndex++;
                isEditing = false;
                render();
            }
        }

        // الانتقال للصفحة السابقة
        function prevPage() {
            if (currentIndex > 0) {
                currentIndex--;
                isEditing = false;
                render();
            }
        }

        // تبديل وضع التعديل
        function toggleEdit() {
            isEditing = !isEditing;
            render();
        }

        // تحديث البيانات عند الكتابة
        function updateContent(value) {
            pages[currentIndex].content = value;
        }

        // تجهيز محتوى الطباعة وتنفيذها
        function handlePrint() {
            const printContainer = document.getElementById('print-container');
            
            // توليد الـ 29 صفحة بالترتيب للتصدير كملف PDF
            printContainer.innerHTML = pages.map(page => `
                <div class="bg-white relative overflow-hidden print-page" style="width: 210mm; height: 297mm; padding: 20mm; box-sizing: border-box;">
                    <div class="flex justify-between items-center mb-8 border-b-2 border-[#7A1B29] pb-4">
                       <h2 class="text-[#7A1B29] font-bold text-2xl">بنك الكريمي الإسلامي <span class="text-sm font-normal text-gray-500">- قطاع الشركات</span></h2>
                       <span class="text-[#F2A900] font-bold">التقرير السنوي</span>
                    </div>

                    <div class="whitespace-pre-wrap font-medium text-lg text-gray-900 leading-loose">
                       ${page.id === 1 ? `
                        <div class="flex flex-col items-center justify-center pt-32 text-center space-y-12">
                           <img src="Asset 1.png" alt="KIB Logo" class="h-32 mb-8" onerror="this.style.display='none'" />
                           <h1 class="text-5xl font-bold text-[#7A1B29]">التقرير السنوي</h1>
                           <h2 class="text-4xl text-gray-500 font-light tracking-widest uppercase">Annual Report</h2>
                           <div class="w-32 h-1 bg-[#F2A900] mx-auto"></div>
                           <h3 class="text-6xl font-black text-gray-800">2024</h3>
                           <div class="mt-16 text-[#7A1B29]">
                              <h4 class="text-3xl font-bold mb-2">بنك الكريمي الإسلامي</h4>
                              <p class="text-xl text-gray-600">AlKuraimi Islamic Bank</p>
                              <p class="text-md font-bold mt-4 text-[#F2A900]">Corporate & Investment Banking</p>
                           </div>
                        </div>
                      ` : page.content.replace(/\n/g, '<br/>')}
                    </div>

                    <div class="absolute bottom-8 left-0 w-full flex justify-center">
                        <span class="text-gray-400 text-sm">${page.id}</span>
                    </div>
                </div>
            `).join('');

            // فتح نافذة الطباعة
            window.print();
        }

        // تهيئة التطبيق عند البداية
        document.addEventListener("DOMContentLoaded", () => {
            render();
            lucide.createIcons();
        });

    </script>
</body>
</html>
